<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Smash · 히스토리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  :root{--green:#00c853;--green-dark:#009624;--green-light:#b9f6ca;--court:#1a472a;--white:#f5fff7;--gray:#b0bec5;--accent:#ffe600;--orange:#ff9800;--red:#ef5350;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--court);color:var(--white);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 100px}
  .nav{display:flex;gap:6px;justify-content:center;padding:16px 0 0;flex-wrap:wrap}
  .nav-btn{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
  .nav-btn.active{background:var(--green);border-color:var(--green);color:#000}
  .nav-btn:hover:not(.active){border-color:var(--green);color:var(--green)}
  header{text-align:center;padding:24px 0 20px}
  .logo-shuttle{font-size:2rem;display:block;animation:spin-float 3s ease-in-out infinite}
  @keyframes spin-float{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(8deg)}}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,3rem);letter-spacing:4px;color:var(--white);text-shadow:0 0 20px rgba(0,200,83,0.5),2px 2px 0 var(--green-dark)}
  .page-title span{color:var(--accent)}
  .conn-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:0.75rem;color:var(--white);background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);transition:background 0.3s}
  .conn-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff88}

  /* 운영자 바 */
  .admin-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:14px}
  .admin-status{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--gray)}
  .admin-dot{width:7px;height:7px;border-radius:50%;background:var(--gray);flex-shrink:0}
  .admin-dot.on{background:var(--accent);box-shadow:0 0 5px var(--accent)}
  .admin-btn-sm{font-family:'Bebas Neue',sans-serif;font-size:0.78rem;letter-spacing:1px;padding:4px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
  .admin-btn-sm:hover{border-color:var(--accent);color:var(--accent)}

  /* 탭 */
  .tab-row{display:flex;gap:8px;margin-bottom:20px}
  .tab-btn{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
  .tab-btn.active{background:var(--green);border-color:var(--green);color:#000}
  .tab-btn:hover:not(.active){border-color:var(--green);color:var(--green)}
  .tab-content{display:none}.tab-content.visible{display:block}

  .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:20px}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* 통계 */
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
  .stat-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;color:var(--green);line-height:1}
  .stat-label{font-size:0.7rem;color:var(--gray);margin-top:4px}

  /* 랭킹 */
  .ranking-list{display:flex;flex-direction:column;gap:6px}
  .rank-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:8px 12px;transition:all 0.2s}
  .rank-row:hover{background:rgba(0,200,83,0.08)}
  .rank-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;min-width:24px;text-align:center;color:var(--gray)}
  .rank-num.gold{color:#ffd700}.rank-num.silver{color:#c0c0c0}.rank-num.bronze{color:#cd7f32}
  .rank-name{flex:1;font-size:0.88rem;font-weight:700;color:var(--white)}
  .rank-stats{display:flex;gap:10px;flex-shrink:0;align-items:center}
  .rank-wr{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px}
  .rank-wl{font-size:0.72rem;color:var(--gray)}
  .rank-rating{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px}
  .r-low{color:#90a4ae}.r-mid{color:var(--accent)}.r-high{color:#ff7043}.r-top{color:#ce93d8}

  /* 필터 */
  .filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .filter-label{font-size:0.78rem;color:var(--gray);flex-shrink:0}
  .filter-select{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;padding:6px 10px;outline:none;cursor:pointer}
  .filter-select option{background:#1a472a}

  /* 게임 기록 */
  .history-date-group{margin-bottom:20px}
  .history-date-label{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--green);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,200,83,0.2);display:flex;justify-content:space-between;align-items:center}
  .history-date-count{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:rgba(0,200,83,0.15);color:var(--green);border-radius:8px;padding:2px 8px;letter-spacing:0}
  .history-game{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:all 0.2s}
  .history-game:hover{background:rgba(0,200,83,0.06);border-color:rgba(0,200,83,0.2)}
  .history-game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .history-court-badge{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:2px;color:rgba(0,200,83,0.6)}
  .history-score-big{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--accent)}
  .history-teams-row{display:flex;align-items:center;gap:8px}
  .history-team{flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;text-align:center}
  .history-team.winner{background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25)}
  .history-team-label{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--gray);margin-bottom:4px}
  .history-team.winner .history-team-label{color:var(--green)}
  .history-team-names{font-size:0.82rem;font-weight:600;line-height:1.5;color:var(--white)}
  .history-vs{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:rgba(255,255,255,0.2);flex-shrink:0}
  .history-meta{margin-top:8px;font-size:0.7rem;color:var(--gray);text-align:right}

  /* 출석 슬라이더 */
  .attend-slider-wrap{overflow:hidden}
  .attend-slider-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .attend-nav-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--white);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .attend-nav-btn:hover{border-color:var(--green);color:var(--green)}
  .attend-nav-btn:disabled{opacity:0.25;cursor:not-allowed}
  .attend-date-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--white)}
  .attend-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .attend-cnt-badge{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:rgba(0,200,83,0.15);color:var(--green);border-radius:8px;padding:2px 8px}
  .fee-cnt-badge{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:rgba(255,152,0,0.15);color:var(--orange);border-radius:8px;padding:2px 8px}
  .monthly-cnt-badge{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:rgba(206,147,216,0.15);color:var(--purple);border-radius:8px;padding:2px 8px}
  .attend-slide-inner{display:flex;transition:transform 0.3s ease}
  .attend-slide{min-width:100%}
  .attend-members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .attend-member-chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;gap:4px}
  .attend-member-chip.fee-paid{border-color:rgba(255,152,0,0.35);background:rgba(255,152,0,0.06)}
  .attend-member-chip.monthly-paid{border-color:rgba(206,147,216,0.35);background:rgba(206,147,216,0.06)}
  .attend-member-name{font-size:0.85rem;font-weight:700;color:var(--white)}
  .attend-tag{font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:5px;display:inline-block}
  .tag-fee{background:rgba(255,152,0,0.2);color:var(--orange);border:1px solid rgba(255,152,0,0.3)}
  .tag-monthly{background:rgba(206,147,216,0.2);color:var(--purple);border:1px solid rgba(206,147,216,0.3)}
  .tag-unpaid{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.1)}
  .attend-dots{display:flex;justify-content:center;gap:6px;margin-top:14px}
  .attend-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);cursor:pointer;transition:background 0.2s}
  .attend-dot.active{background:var(--green)}

  /* 출석률 바 */
  .attend-rate-bar{margin-bottom:16px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px}
  .attend-rate-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .attend-rate-name{font-size:0.82rem;font-weight:600;min-width:70px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .attend-rate-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
  .attend-rate-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width 0.4s}
  .attend-rate-pct{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;color:var(--green);min-width:34px;text-align:right}

  .admin-only-notice{text-align:center;padding:30px 20px;color:rgba(255,255,255,0.3);font-size:0.88rem;border:1px dashed rgba(255,255,255,0.1);border-radius:12px}
  .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);font-size:0.88rem}
  .loading{text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:0.85rem}

  /* 비밀번호 모달 */
  .pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
  .pw-modal.open{display:flex}
  .pw-box{background:#1e5c34;border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:28px 24px;width:90%;max-width:340px;text-align:center}
  .pw-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--green);margin-bottom:6px}
  .pw-sub{font-size:0.8rem;color:var(--gray);margin-bottom:18px}
  .pw-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:var(--white);font-size:1.1rem;padding:12px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;transition:border-color 0.2s}
  .pw-input:focus{border-color:var(--green)}
  .pw-input.error{border-color:var(--red);animation:shake 0.3s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .pw-actions{display:flex;gap:8px}
  .pw-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--white);border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm{flex:2;background:var(--green);color:#000;border:none;border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm:hover{background:var(--green-dark)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:700;font-size:0.85rem;padding:10px 22px;border-radius:20px;box-shadow:0 4px 20px rgba(0,200,83,0.4);transition:transform 0.3s ease;z-index:999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a class="nav-btn" href="notice.html">📢 공지</a>
    <a class="nav-btn" href="index.html">🏸 메인</a>
    <a class="nav-btn" href="members.html">👥 멤버</a>
    <a class="nav-btn active" href="history.html">📋 히스토리</a>
  </nav>

  <header>
    <span class="logo-shuttle">📋</span>
    <div class="page-title">매칭 <span>히스토리</span></div>
    <div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connText">연결 중...</span></div>
  </header>

  <!-- 운영자 바 -->
  <div class="admin-bar">
    <div class="admin-status"><div class="admin-dot" id="adminDot"></div><span id="adminStatusText">일반 모드</span></div>
    <button class="admin-btn-sm" id="adminToggleBtn" onclick="toggleAdminMode()">🔐 운영자 로그인</button>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <button class="tab-btn active" id="tab-game" onclick="switchTab('game')">🏸 게임 기록</button>
    <button class="tab-btn" id="tab-attend" onclick="switchTab('attend')">✅ 출석 기록</button>
  </div>

  <!-- 게임 기록 탭 -->
  <div class="tab-content visible" id="content-game">
    <div class="card">
      <div class="section-title">📊 전체 통계</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="statGames">-</div><div class="stat-label">총 게임 수</div></div>
        <div class="stat-box"><div class="stat-num" id="statDays">-</div><div class="stat-label">활동 일수</div></div>
        <div class="stat-box"><div class="stat-num" id="statAvgScore">-</div><div class="stat-label">평균 점수차</div></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">🏆 멤버 랭킹 <span style="font-family:'Noto Sans KR';font-size:0.75rem;font-weight:400;color:var(--gray);letter-spacing:0">승률순</span></div>
      <div class="ranking-list" id="rankingList"><div class="loading">로딩 중...</div></div>
    </div>

    <div class="card">
      <div class="section-title">🗓 게임 기록</div>
      <div class="filter-row">
        <span class="filter-label">기간:</span>
        <select class="filter-select" id="periodFilter" onchange="applyFilter()">
          <option value="all">전체</option>
          <option value="7">최근 1주</option>
          <option value="30">최근 1달</option>
          <option value="84">최근 12주</option>
        </select>
        <span class="filter-label" style="margin-left:8px">멤버:</span>
        <select class="filter-select" id="memberFilter" onchange="applyFilter()">
          <option value="all">전체</option>
        </select>
      </div>
      <div id="historyContainer"><div class="loading">로딩 중...</div></div>
    </div>
  </div>

  <!-- 출석 기록 탭 (운영자만) -->
  <div class="tab-content" id="content-attend">
    <div class="card">
      <div class="section-title">📈 출석률 랭킹</div>
      <div id="attendRateContainer"><div class="loading">로딩 중...</div></div>
    </div>
    <div class="card">
      <div class="section-title">📅 날짜별 출석 기록</div>
      <div id="attendHistoryContainer"><div class="loading">로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- 비밀번호 모달 -->
<div class="pw-modal" id="pwModal">
  <div class="pw-box">
    <div class="pw-title">🔐 운영자 인증</div>
    <div class="pw-sub">운영자 비밀번호를 입력하세요</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="••••••" maxlength="20">
    <div class="pw-actions">
      <button class="pw-cancel" onclick="closePwModal()">취소</button>
      <button class="pw-confirm" onclick="confirmPassword()">확인</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCTcxZfr-L-oe25DJyNMj3e8vdEgmbgqog",
    authDomain:"tokyo-smash.firebaseapp.com",
    databaseURL:"https://tokyo-smash-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"tokyo-smash",storageBucket:"tokyo-smash.firebasestorage.app",
    messagingSenderId:"885467955971",
    appId:"1:885467955971:web:e1ad21d28e0a910a02df36",
    measurementId:"G-D6V57RK9VK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db,'.info/connected'), snap=>{
    const on=snap.val();
    document.getElementById('connDot').className='conn-dot'+(on?' online':'');
    document.getElementById('connText').textContent=on?'실시간 연결됨 ✓':'오프라인';
  });

  let allHistory=[], allMembers={}, allPresent={}, allFee={}, allMonthlyFee={};
  let isAdmin = sessionStorage.getItem('ts_admin')==='1';
  let currentTab = 'game';

  // ── 운영자 모드 ──
  function applyAdminUI(){
    const dot=document.getElementById('adminDot');
    const txt=document.getElementById('adminStatusText');
    const btn=document.getElementById('adminToggleBtn');
    if(isAdmin){
      dot.className='admin-dot on';
      txt.textContent='운영자 모드 ✓';
      btn.textContent='🔓 로그아웃';
    } else {
      dot.className='admin-dot';
      txt.textContent='일반 모드';
      btn.textContent='🔐 운영자 로그인';
    }
    // 출석 탭 내용 업데이트
    if(currentTab==='attend') renderAttendTab();
  }

  window.toggleAdminMode=function(){
    if(isAdmin){isAdmin=false;sessionStorage.removeItem('ts_admin');applyAdminUI();toast('로그아웃됨');}
    else openPwModal();
  };
  window.openPwModal=function(){document.getElementById('pwInput').value='';document.getElementById('pwInput').className='pw-input';document.getElementById('pwModal').classList.add('open');setTimeout(()=>document.getElementById('pwInput').focus(),100);};
  window.closePwModal=function(){document.getElementById('pwModal').classList.remove('open');};
  window.confirmPassword=async function(){
    const val=document.getElementById('pwInput').value;
    try{
      const snap=await new Promise(res=>onValue(ref(db,'config/adminPw'),res,{onlyOnce:true}));
      const pw=snap.val();
      if(val===pw){isAdmin=true;sessionStorage.setItem('ts_admin','1');closePwModal();applyAdminUI();toast('운영자 모드 활성화 ✓');}
      else{const inp=document.getElementById('pwInput');inp.className='pw-input error';inp.value='';setTimeout(()=>inp.className='pw-input',600);toast('비밀번호가 틀렸어요');}
    }catch(e){toast('연결 오류, 다시 시도해주세요');}
  };
  document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.confirmPassword();});
  document.getElementById('pwModal').addEventListener('click',e=>{if(e.target.id==='pwModal')closePwModal();});

  // ── 탭 전환 ──
  window.switchTab=function(tab){
    currentTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('visible'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`content-${tab}`).classList.add('visible');
    if(tab==='attend') renderAttendTab();
  };

  // ── 데이터 구독 ──
  onValue(ref(db,'members'), snap=>{ allMembers=snap.val()||{}; buildMemberFilter(); renderRanking(); if(currentTab==='attend') renderAttendTab(); });
  onValue(ref(db,'history'), snap=>{
    const raw=snap.val()||{};
    allHistory=Object.values(raw).sort((a,b)=>b.createdAt-a.createdAt);
    renderStats(); renderRanking(); buildMemberFilter(); applyFilter();
  });
  onValue(ref(db,'present'), snap=>{ allPresent=snap.val()||{}; if(currentTab==='attend') renderAttendTab(); });
  onValue(ref(db,'monthlyFee'), snap=>{ allMonthlyFee=snap.val()||{}; if(currentTab==='attend') renderAttendTab(); });
  onValue(ref(db,'fee'), snap=>{ allFee=snap.val()||{}; if(currentTab==='attend') renderAttendTab(); });

  applyAdminUI();

  // ── 게임 통계 ──
  function renderStats(){
    const days=new Set(allHistory.map(h=>h.date)).size;
    const avgDiff=allHistory.length?Math.round(allHistory.reduce((s,h)=>s+Math.abs(h.scoreA-h.scoreB),0)/allHistory.length*10)/10:0;
    document.getElementById('statGames').textContent=allHistory.length;
    document.getElementById('statDays').textContent=days;
    document.getElementById('statAvgScore').textContent=avgDiff||'-';
  }

  // ── 멤버 랭킹 ──
  function renderRanking(){
    const stats={};
    for(const h of allHistory){
      const winners=h.winner==='A'?h.teamA:h.teamB, losers=h.winner==='A'?h.teamB:h.teamA;
      for(const n of winners){if(!stats[n])stats[n]={w:0,l:0};stats[n].w++;}
      for(const n of losers){if(!stats[n])stats[n]={w:0,l:0};stats[n].l++;}
    }
    const ranked=Object.entries(stats).map(([name,s])=>({name,w:s.w,l:s.l,games:s.w+s.l,wr:s.w+s.l>0?Math.round(s.w/(s.w+s.l)*100):0})).sort((a,b)=>b.wr-a.wr||b.games-a.games);
    const list=document.getElementById('rankingList');
    if(!ranked.length){list.innerHTML='<div class="loading" style="padding:16px">게임 기록이 없어요</div>';return;}
    const nameToRating={};for(const m of Object.values(allMembers)) nameToRating[m.name]=m.rating??50;
    function getRank(rating){
      if(rating>=85) return {rank:'S',color:'#ff6b6b'};
      if(rating>=65) return {rank:'A',color:'#ffd93d'};
      if(rating>=45) return {rank:'B',color:'#6bcb77'};
      if(rating>=25) return {rank:'C',color:'#4d96ff'};
      return {rank:'D',color:'#b0bec5'};
    }
    list.innerHTML=ranked.map(({name,w,l,games,wr},i)=>{
      const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const r=nameToRating[name]??50, rc=r>=80?'r-top':r>=60?'r-high':r>=35?'r-mid':'r-low';
      const wrColor=wr>=60?'var(--green)':wr>=50?'var(--accent)':'var(--red)';
      const {rank,color:rankColor}=getRank(r);
      return `<div class="rank-row"><span class="rank-num ${rankClass}">${i+1}</span><span class="rank-name">${esc(name)}</span>
        <div class="rank-stats"><div><div class="rank-wr" style="color:${wrColor}">${wr}%</div><div class="rank-wl">${w}승 ${l}패</div></div>
        <div style="text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:${rankColor}">${rank}</div><div class="rank-rating ${rc}">${r}</div></div></div></div>`;
    }).join('');
  }

  // ── 게임 필터 ──
  function buildMemberFilter(){
    const sel=document.getElementById('memberFilter'), current=sel.value;
    const names=new Set();for(const h of allHistory){h.teamA.forEach(n=>names.add(n));h.teamB.forEach(n=>names.add(n));}
    const opts=['<option value="all">전체</option>'];
    [...names].sort().forEach(n=>opts.push(`<option value="${esc(n)}" ${current===n?'selected':''}>${esc(n)}</option>`));
    sel.innerHTML=opts.join('');
  }

  window.applyFilter=function(){
    const days=parseInt(document.getElementById('periodFilter').value)||0;
    const member=document.getElementById('memberFilter').value;
    const cutoff=days>0?new Date(Date.now()-days*86400000).toISOString().slice(0,10):'';
    const filtered=allHistory.filter(h=>{
      if(cutoff&&h.date<cutoff) return false;
      if(member!=='all'&&![...h.teamA,...h.teamB].includes(member)) return false;
      return true;
    });
    renderHistoryList(filtered);
  };

  function renderHistoryList(list){
    const container=document.getElementById('historyContainer');
    if(!list.length){container.innerHTML='<div class="empty-state">해당 조건의 기록이 없어요</div>';return;}
    const byDate={};for(const h of list){if(!byDate[h.date])byDate[h.date]=[];byDate[h.date].push(h);}
    container.innerHTML=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,games])=>{
      const label=new Date(date+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
      const gameHtml=games.sort((a,b)=>a.court-b.court).map(h=>{
        const winnerA=h.winner==='A', diff=Math.abs(h.scoreA-h.scoreB);
        return `<div class="history-game">
          <div class="history-game-header"><span class="history-court-badge">🏟 COURT ${h.court}</span><span class="history-score-big">${h.scoreA} : ${h.scoreB}</span></div>
          <div class="history-teams-row">
            <div class="history-team ${winnerA?'winner':''}"><div class="history-team-label">${winnerA?'🏆 팀 A':'팀 A'}</div><div class="history-team-names">${h.teamA.map(esc).join('<br>')}</div></div>
            <div class="history-vs">VS</div>
            <div class="history-team ${!winnerA?'winner':''}"><div class="history-team-label">${!winnerA?'🏆 팀 B':'팀 B'}</div><div class="history-team-names">${h.teamB.map(esc).join('<br>')}</div></div>
          </div>
          <div class="history-meta">점수차 ${diff}점</div>
        </div>`;
      }).join('');
      return `<div class="history-date-group"><div class="history-date-label"><span>${label}</span><span class="history-date-count">${games.length}게임</span></div>${gameHtml}</div>`;
    }).join('');
  }

  // ── 출석 기록 탭 ──
  function renderAttendTab(){
    const histContainer=document.getElementById('attendHistoryContainer');

    // 출석률 랭킹은 누구나
    renderAttendRate();

    // 날짜별 기록은 운영자만
    if(!isAdmin){
      histContainer.innerHTML=`<div class="admin-only-notice">🔐 운영자만 날짜별 출석 기록을 볼 수 있어요</div>`;
      return;
    }
    renderAttendHistory();
  }

  // 출석률 랭킹
  function renderAttendRate(){
    const container=document.getElementById('attendRateContainer');
    const totalDays=Object.keys(allPresent).length;
    if(!totalDays){container.innerHTML='<div class="empty-state">출석 기록이 없어요</div>';return;}

    // 멤버별 출석 횟수 집계
    const attendCount={};
    for(const [date, dayPresent] of Object.entries(allPresent)){
      for(const id of Object.keys(dayPresent)){
        if(!attendCount[id]) attendCount[id]=0;
        attendCount[id]++;
      }
    }

    const memberList=Object.entries(allMembers).map(([id,m])=>({
      id, name:m.name, rating:m.rating??50,
      cnt:attendCount[id]||0,
      rate:totalDays>0?Math.round((attendCount[id]||0)/totalDays*100):0
    })).sort((a,b)=>b.cnt-a.cnt||b.rate-a.rate);

    if(!memberList.length){container.innerHTML='<div class="empty-state">멤버가 없어요</div>';return;}

    container.innerHTML=`
      <div style="font-size:0.72rem;color:var(--gray);margin-bottom:10px">총 ${totalDays}일 기준</div>
      <div class="attend-rate-bar">
        ${memberList.map(m=>`
          <div class="attend-rate-row">
            <span class="attend-rate-name">${esc(m.name)}</span>
            <div class="attend-rate-bar-bg"><div class="attend-rate-bar-fill" style="width:${m.rate}%"></div></div>
            <span class="attend-rate-pct">${m.rate}%</span>
            <span style="font-size:0.7rem;color:var(--gray);min-width:40px;text-align:right">${m.cnt}/${totalDays}회</span>
          </div>`).join('')}
      </div>`;
  }

  // 날짜별 출석 기록
  let attendIdx=0;
  let attendEntries=[];

  window.renderAttendHistory=function(){
    const container=document.getElementById('attendHistoryContainer');
    if(!isAdmin){container.innerHTML='<div class="admin-only-notice">🔐 운영자만 볼 수 있어요</div>';return;}

    const idToMember={};
    for(const [id,m] of Object.entries(allMembers)) idToMember[id]=m;

    attendEntries=Object.entries(allPresent).sort((a,b)=>b[0].localeCompare(a[0]));

    if(!attendEntries.length){container.innerHTML='<div class="empty-state">출석 기록이 없어요</div>';return;}

    attendIdx=Math.min(attendIdx,attendEntries.length-1);

    const slides=attendEntries.map(([date,dayPresent])=>{
      const dayFee=allFee[date]||{};
      const dayMonthly=allMonthlyFee[date.slice(0,7)]||{};
      const presentIds=Object.keys(dayPresent);
      const chips=presentIds
        .filter(id=>idToMember[id])
        .sort((a,b)=>idToMember[a].name.localeCompare(idToMember[b].name,'ko'))
        .map(id=>{
          const m=idToMember[id];
          const isMonthly=!!dayMonthly[id];
          const paid=!!dayFee[id];
          const chipClass=isMonthly?'monthly-paid':paid?'fee-paid':'';
          const tagHtml=isMonthly?'<span class="attend-tag tag-monthly">💜 월회비</span>':paid?'<span class="attend-tag tag-fee">💰 납부</span>':'<span class="attend-tag tag-unpaid">미납</span>';
          return `<div class="attend-member-chip ${chipClass}"><div class="attend-member-name">${esc(m.name)}</div>${tagHtml}</div>`;
        }).join('');
      return {date,dayPresent,dayFee,dayMonthly,presentIds,chips};
    });

    container.innerHTML=`
      <div class="attend-slider-wrap">
        <div class="attend-slider-nav">
          <button class="attend-nav-btn" id="attendPrev" onclick="attendNav(-1)">←</button>
          <div class="attend-date-label" id="attendDateLabel"></div>
          <button class="attend-nav-btn" id="attendNext" onclick="attendNav(1)">→</button>
        </div>
        <div class="attend-badges" id="attendBadges"></div>
        <div class="attend-slider-wrap" style="overflow:hidden">
          <div class="attend-slide-inner" id="attendSlideInner">
            ${slides.map(s=>`<div class="attend-slide"><div class="attend-members-grid">${s.chips}</div></div>`).join('')}
          </div>
        </div>
        <div class="attend-dots" id="attendDots">
          ${slides.map((_,i)=>`<div class="attend-dot${i===attendIdx?' active':''}" onclick="attendGoTo(${i})"></div>`).join('')}
        </div>
      </div>`;

    updateAttendSlide(slides);
  };

  function updateAttendSlide(slides){
    if(!slides) return;
    const s=attendEntries[attendIdx];
    if(!s) return;
    const [date,dayPresent]=s;
    const dayFee=allFee[date]||{};
    const dayMonthly=allMonthlyFee[date.slice(0,7)]||{};
    const presentIds=Object.keys(dayPresent);
    const feeCnt=presentIds.filter(id=>dayFee[id]).length;
    const monthlyCnt=presentIds.filter(id=>dayMonthly[id]).length;
    const label=new Date(date+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

    const inner=document.getElementById('attendSlideInner');
    const dateLabel=document.getElementById('attendDateLabel');
    const badges=document.getElementById('attendBadges');
    const dots=document.querySelectorAll('.attend-dot');
    const prevBtn=document.getElementById('attendPrev');
    const nextBtn=document.getElementById('attendNext');

    if(inner) inner.style.transform=`translateX(-${attendIdx*100}%)`;
    if(dateLabel) dateLabel.textContent=label;
    if(badges) badges.innerHTML=`
      <span class="attend-cnt-badge">출석 ${presentIds.length}명</span>
      <span class="fee-cnt-badge">납부 ${feeCnt}명</span>
      ${monthlyCnt>0?`<span class="monthly-cnt-badge">월회비 ${monthlyCnt}명</span>`:''}`;
    dots.forEach((d,i)=>d.className='attend-dot'+(i===attendIdx?' active':''));
    if(prevBtn) prevBtn.disabled=attendIdx===0;
    if(nextBtn) nextBtn.disabled=attendIdx===attendEntries.length-1;
  }

  window.attendNav=function(dir){
    attendIdx=Math.max(0,Math.min(attendEntries.length-1,attendIdx+dir));
    updateAttendSlide();
  };
  window.attendGoTo=function(i){attendIdx=i;updateAttendSlide();};

  function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let tt;
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
</html>
