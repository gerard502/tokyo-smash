<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Smash · 히스토리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  :root{--green:#00c853;--green-dark:#009624;--green-light:#b9f6ca;--court:#1a472a;--white:#f5fff7;--gray:#b0bec5;--accent:#ffe600;--orange:#ff9800;--red:#ef5350;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--court);color:var(--white);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 100px}
  .nav{display:flex;gap:6px;justify-content:center;padding:16px 0 0;flex-wrap:wrap}
  .nav-btn{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
  .nav-btn.active{background:var(--green);border-color:var(--green);color:#000}
  .nav-btn:hover:not(.active){border-color:var(--green);color:var(--green)}
  header{text-align:center;padding:24px 0 20px}
  .logo-shuttle{font-size:2rem;display:block;animation:spin-float 3s ease-in-out infinite}
  @keyframes spin-float{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(8deg)}}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,3rem);letter-spacing:4px;color:var(--white);text-shadow:0 0 20px rgba(0,200,83,0.5),2px 2px 0 var(--green-dark)}
  .page-title span{color:var(--accent)}
  .conn-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:0.75rem;color:var(--white);background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);transition:background 0.3s}
  .conn-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff88}
  .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:20px}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
  .stat-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;color:var(--green);line-height:1}
  .stat-label{font-size:0.7rem;color:var(--gray);margin-top:4px}
  .ranking-list{display:flex;flex-direction:column;gap:6px}
  .rank-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:8px 12px;transition:all 0.2s}
  .rank-row:hover{background:rgba(0,200,83,0.08)}
  .rank-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;min-width:24px;text-align:center;color:var(--gray)}
  .rank-num.gold{color:#ffd700}.rank-num.silver{color:#c0c0c0}.rank-num.bronze{color:#cd7f32}
  .rank-name{flex:1;font-size:0.88rem;font-weight:700;color:var(--white)}
  .rank-stats{display:flex;gap:10px;flex-shrink:0;align-items:center}
  .rank-wr{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px}
  .rank-wl{font-size:0.72rem;color:var(--gray)}
  .rank-rating{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px}
  .r-low{color:#90a4ae}.r-mid{color:var(--accent)}.r-high{color:#ff7043}.r-top{color:#ce93d8}
  .filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .filter-label{font-size:0.78rem;color:var(--gray);flex-shrink:0}
  .filter-select{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;padding:6px 10px;outline:none;cursor:pointer}
  .filter-select option{background:#1a472a}
  .history-date-group{margin-bottom:20px}
  .history-date-label{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--green);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,200,83,0.2);display:flex;justify-content:space-between;align-items:center}
  .history-date-count{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:rgba(0,200,83,0.15);color:var(--green);border-radius:8px;padding:2px 8px;letter-spacing:0}
  .history-game{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:all 0.2s}
  .history-game:hover{background:rgba(0,200,83,0.06);border-color:rgba(0,200,83,0.2)}
  .history-game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .history-court-badge{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:2px;color:rgba(0,200,83,0.6)}
  .history-score-big{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--accent)}
  .history-teams-row{display:flex;align-items:center;gap:8px}
  .history-team{flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;text-align:center}
  .history-team.winner{background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25)}
  .history-team-label{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--gray);margin-bottom:4px}
  .history-team.winner .history-team-label{color:var(--green)}
  .history-team-names{font-size:0.82rem;font-weight:600;line-height:1.5;color:var(--white)}
  .history-vs{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;color:rgba(255,255,255,0.2);flex-shrink:0}
  .history-meta{margin-top:8px;font-size:0.7rem;color:var(--gray);text-align:right}
  .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);font-size:0.88rem}
  .loading{text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:0.85rem}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:700;font-size:0.85rem;padding:10px 22px;border-radius:20px;box-shadow:0 4px 20px rgba(0,200,83,0.4);transition:transform 0.3s ease;z-index:999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a class="nav-btn" href="notice.html">📢 공지</a>
    <a class="nav-btn" href="index.html">🏸 메인</a>
    <a class="nav-btn" href="members.html">👥 멤버</a>
    <a class="nav-btn active" href="history.html">📋 히스토리</a>
  </nav>
  <header>
    <span class="logo-shuttle">📋</span>
    <div class="page-title">매칭 <span>히스토리</span></div>
    <div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connText">연결 중...</span></div>
  </header>

  <div class="card">
    <div class="section-title">📊 전체 통계</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="statGames">-</div><div class="stat-label">총 게임 수</div></div>
      <div class="stat-box"><div class="stat-num" id="statDays">-</div><div class="stat-label">활동 일수</div></div>
      <div class="stat-box"><div class="stat-num" id="statAvgScore">-</div><div class="stat-label">평균 점수차</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">🏆 멤버 랭킹 <span style="font-family:'Noto Sans KR';font-size:0.75rem;font-weight:400;color:var(--gray);letter-spacing:0">승률순</span></div>
    <div class="ranking-list" id="rankingList"><div class="loading">로딩 중...</div></div>
  </div>

  <div class="card">
    <div class="section-title">🗓 게임 기록</div>
    <div class="filter-row">
      <span class="filter-label">기간:</span>
      <select class="filter-select" id="periodFilter" onchange="applyFilter()">
        <option value="all">전체</option>
        <option value="7">최근 1주</option>
        <option value="30">최근 1달</option>
        <option value="84">최근 12주</option>
      </select>
      <span class="filter-label" style="margin-left:8px">멤버:</span>
      <select class="filter-select" id="memberFilter" onchange="applyFilter()">
        <option value="all">전체</option>
      </select>
    </div>
    <div id="historyContainer"><div class="loading">로딩 중...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCTcxZfr-L-oe25DJyNMj3e8vdEgmbgqog",
    authDomain:"tokyo-smash.firebaseapp.com",
    databaseURL:"https://tokyo-smash-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"tokyo-smash",storageBucket:"tokyo-smash.firebasestorage.app",
    messagingSenderId:"885467955971",
    appId:"1:885467955971:web:e1ad21d28e0a910a02df36",
    measurementId:"G-D6V57RK9VK"
  };

  const app=initializeApp(firebaseConfig);
  const db=getDatabase(app);

  onValue(ref(db,'.info/connected'),snap=>{const on=snap.val();document.getElementById('connDot').className='conn-dot'+(on?' online':'');document.getElementById('connText').textContent=on?'실시간 연결됨 ✓':'오프라인';});

  let allHistory=[],allMembers={};

  onValue(ref(db,'members'),snap=>{allMembers=snap.val()||{};buildMemberFilter();renderRanking();});
  onValue(ref(db,'history'),snap=>{
    const raw=snap.val()||{};
    allHistory=Object.values(raw).sort((a,b)=>b.createdAt-a.createdAt);
    renderStats();renderRanking();buildMemberFilter();applyFilter();
  });

  function renderStats(){
    const days=new Set(allHistory.map(h=>h.date)).size;
    const avgDiff=allHistory.length?Math.round(allHistory.reduce((s,h)=>s+Math.abs(h.scoreA-h.scoreB),0)/allHistory.length*10)/10:0;
    document.getElementById('statGames').textContent=allHistory.length;
    document.getElementById('statDays').textContent=days;
    document.getElementById('statAvgScore').textContent=avgDiff||'-';
  }

  function renderRanking(){
    const stats={};
    for(const h of allHistory){
      const winners=h.winner==='A'?h.teamA:h.teamB,losers=h.winner==='A'?h.teamB:h.teamA;
      for(const n of winners){if(!stats[n])stats[n]={w:0,l:0};stats[n].w++;}
      for(const n of losers){if(!stats[n])stats[n]={w:0,l:0};stats[n].l++;}
    }
    const ranked=Object.entries(stats).map(([name,s])=>({name,w:s.w,l:s.l,games:s.w+s.l,wr:s.w+s.l>0?Math.round(s.w/(s.w+s.l)*100):0})).sort((a,b)=>b.wr-a.wr||b.games-a.games);
    const list=document.getElementById('rankingList');
    if(!ranked.length){list.innerHTML='<div class="loading" style="padding:16px">게임 기록이 없어요</div>';return;}
    const nameToRating={};for(const m of Object.values(allMembers))nameToRating[m.name]=m.rating??50;
    list.innerHTML=ranked.map(({name,w,l,games,wr},i)=>{
      const rankClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const r=nameToRating[name]??50,rc=r>=80?'r-top':r>=60?'r-high':r>=35?'r-mid':'r-low';
      const wrColor=wr>=60?'var(--green)':wr>=50?'var(--accent)':'var(--red)';
      return `<div class="rank-row"><span class="rank-num ${rankClass}">${i+1}</span><span class="rank-name">${esc(name)}</span>
        <div class="rank-stats"><div><div class="rank-wr" style="color:${wrColor}">${wr}%</div><div class="rank-wl">${w}승 ${l}패</div></div><div class="rank-rating ${rc}">Lv.${r}</div></div></div>`;
    }).join('');
  }

  function buildMemberFilter(){
    const sel=document.getElementById('memberFilter'),current=sel.value;
    const names=new Set();for(const h of allHistory){h.teamA.forEach(n=>names.add(n));h.teamB.forEach(n=>names.add(n));}
    const opts=['<option value="all">전체</option>'];
    [...names].sort().forEach(n=>opts.push(`<option value="${esc(n)}" ${current===n?'selected':''}>${esc(n)}</option>`));
    sel.innerHTML=opts.join('');
  }

  window.applyFilter=function(){
    const days=parseInt(document.getElementById('periodFilter').value)||0;
    const member=document.getElementById('memberFilter').value;
    const cutoff=days>0?new Date(Date.now()-days*86400000).toISOString().slice(0,10):'';
    const filtered=allHistory.filter(h=>{
      if(cutoff&&h.date<cutoff)return false;
      if(member!=='all'&&![...h.teamA,...h.teamB].includes(member))return false;
      return true;
    });
    renderHistoryList(filtered);
  };

  function renderHistoryList(list){
    const container=document.getElementById('historyContainer');
    if(!list.length){container.innerHTML='<div class="empty-state">해당 조건의 기록이 없어요</div>';return;}
    const byDate={};for(const h of list){if(!byDate[h.date])byDate[h.date]=[];byDate[h.date].push(h);}
    container.innerHTML=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,games])=>{
      const label=new Date(date+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
      const gameHtml=games.sort((a,b)=>a.court-b.court).map(h=>{
        const winnerA=h.winner==='A',diff=Math.abs(h.scoreA-h.scoreB);
        return `<div class="history-game">
          <div class="history-game-header"><span class="history-court-badge">🏟 COURT ${h.court}</span><span class="history-score-big">${h.scoreA} : ${h.scoreB}</span></div>
          <div class="history-teams-row">
            <div class="history-team ${winnerA?'winner':''}"><div class="history-team-label">${winnerA?'🏆 팀 A':'팀 A'}</div><div class="history-team-names">${h.teamA.map(esc).join('<br>')}</div></div>
            <div class="history-vs">VS</div>
            <div class="history-team ${!winnerA?'winner':''}"><div class="history-team-label">${!winnerA?'🏆 팀 B':'팀 B'}</div><div class="history-team-names">${h.teamB.map(esc).join('<br>')}</div></div>
          </div>
          <div class="history-meta">점수차 ${diff}점 · 레이팅 ±${h.delta}</div>
        </div>`;
      }).join('');
      return `<div class="history-date-group"><div class="history-date-label"><span>${label}</span><span class="history-date-count">${games.length}게임</span></div>${gameHtml}</div>`;
    }).join('');
  }

  function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
