<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Smash · 공지사항</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  :root{--green:#00c853;--green-dark:#009624;--green-light:#b9f6ca;--court:#1a472a;--white:#f5fff7;--gray:#b0bec5;--accent:#ffe600;--orange:#ff9800;--red:#ef5350;--purple:#ce93d8;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--court);color:var(--white);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 100px}
  .nav{display:flex;gap:6px;justify-content:center;padding:16px 0 0;flex-wrap:wrap}
  .nav-btn{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
  .nav-btn.active{background:var(--green);border-color:var(--green);color:#000}
  .nav-btn:hover:not(.active){border-color:var(--green);color:var(--green)}
  header{text-align:center;padding:24px 0 20px}
  .logo-shuttle{font-size:2rem;display:block;animation:spin-float 3s ease-in-out infinite}
  @keyframes spin-float{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(8deg)}}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,3rem);letter-spacing:4px;color:var(--white);text-shadow:0 0 20px rgba(0,200,83,0.5),2px 2px 0 var(--green-dark)}
  .page-title span{color:var(--accent)}
  .conn-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:0.75rem;color:var(--white);background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);transition:background 0.3s}
  .conn-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff88}

  /* 운영자 바 */
  .admin-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:16px}
  .admin-status{display:flex;align-items:center;gap:8px;font-size:0.82rem}
  .admin-dot{width:8px;height:8px;border-radius:50%;background:var(--gray)}
  .admin-dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .admin-btn-sm{font-family:'Bebas Neue',sans-serif;font-size:0.8rem;letter-spacing:1px;padding:5px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:var(--white);cursor:pointer;transition:all 0.2s}
  .admin-btn-sm:hover{border-color:var(--accent);color:var(--accent)}

  .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:20px}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* 공지 작성 폼 (운영자만) */
  .write-form{display:none;flex-direction:column;gap:10px;margin-bottom:20px}
  .write-form.visible{display:flex}
  .write-input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;padding:10px 14px;outline:none;transition:border-color 0.2s;width:100%}
  .write-input:focus{border-color:var(--green)}
  .write-input::placeholder{color:rgba(255,255,255,0.3)}
  .write-textarea{resize:vertical;min-height:100px;line-height:1.6}
  .write-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .type-select{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;padding:8px 12px;outline:none;cursor:pointer;flex-shrink:0}
  .type-select option{background:#1a472a}
  .pin-toggle{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--gray);cursor:pointer;user-select:none}
  .pin-toggle input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
  .write-btn{background:var(--green);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;border:none;border-radius:10px;padding:10px 20px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .write-btn:hover{background:var(--green-dark)}
  .write-btn-add{width:100%;padding:12px;background:transparent;border:1px dashed rgba(0,200,83,0.3);border-radius:10px;color:rgba(0,200,83,0.6);font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-bottom:6px}
  .write-btn-add:hover{border-color:var(--green);color:var(--green)}

  /* 공지 카드 */
  .notice-list{display:flex;flex-direction:column;gap:12px}
  .notice-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;transition:all 0.2s;position:relative}
  .notice-card:hover{background:rgba(255,255,255,0.07)}
  .notice-card.pinned{border-color:rgba(255,230,0,0.3);background:rgba(255,230,0,0.04)}
  .notice-card.type-event{border-left:3px solid var(--orange)}
  .notice-card.type-notice{border-left:3px solid var(--green)}
  .notice-card.type-ad{border-left:3px solid var(--purple)}
  .notice-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
  .notice-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
  .badge{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:1px;padding:2px 8px;border-radius:6px}
  .badge-notice{background:rgba(0,200,83,0.2);color:var(--green);border:1px solid rgba(0,200,83,0.3)}
  .badge-event{background:rgba(255,152,0,0.2);color:var(--orange);border:1px solid rgba(255,152,0,0.3)}
  .badge-ad{background:rgba(206,147,216,0.2);color:var(--purple);border:1px solid rgba(206,147,216,0.3)}
  .badge-pin{background:rgba(255,230,0,0.15);color:var(--accent);border:1px solid rgba(255,230,0,0.3)}
  .notice-title{flex:1;font-size:0.95rem;font-weight:700;color:var(--white);line-height:1.3}
  .notice-body{font-size:0.85rem;color:rgba(255,255,255,0.7);line-height:1.7;white-space:pre-wrap;word-break:break-word}
  .notice-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .notice-date{font-size:0.72rem;color:var(--gray)}
  .notice-actions{display:flex;gap:6px}
  .notice-edit-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
  .notice-edit-btn:hover{border-color:var(--accent);color:var(--accent)}
  .notice-del-btn{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
  .notice-del-btn:hover{border-color:var(--red);color:var(--red)}

  /* 편집 모드 */
  .notice-card.editing{border-color:rgba(255,230,0,0.4);background:rgba(255,230,0,0.04)}

  .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);font-size:0.9rem}

  /* 비밀번호 모달 */
  .pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
  .pw-modal.open{display:flex}
  .pw-box{background:#1e5c34;border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:28px 24px;width:90%;max-width:340px;text-align:center}
  .pw-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--green);margin-bottom:6px}
  .pw-sub{font-size:0.8rem;color:var(--gray);margin-bottom:18px}
  .pw-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:var(--white);font-size:1.1rem;padding:12px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;transition:border-color 0.2s}
  .pw-input:focus{border-color:var(--green)}
  .pw-input.error{border-color:var(--red);animation:shake 0.3s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .pw-actions{display:flex;gap:8px}
  .pw-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--white);border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm{flex:2;background:var(--green);color:#000;border:none;border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm:hover{background:var(--green-dark)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:700;font-size:0.85rem;padding:10px 22px;border-radius:20px;box-shadow:0 4px 20px rgba(0,200,83,0.4);transition:transform 0.3s ease;z-index:999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a class="nav-btn active" href="notice.html">📢 공지</a>
    <a class="nav-btn" href="index.html">🏸 메인</a>
    <a class="nav-btn" href="members.html">👥 멤버</a>
    <a class="nav-btn" href="history.html">📋 히스토리</a>
  </nav>

  <header>
    <span class="logo-shuttle">📢</span>
    <div class="page-title">공지 <span>사항</span></div>
    <div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connText">연결 중...</span></div>
  </header>

  <!-- 운영자 바 -->
  <div class="admin-bar">
    <div class="admin-status">
      <div class="admin-dot" id="adminDot"></div>
      <span id="adminStatusText">일반 모드</span>
    </div>
    <button class="admin-btn-sm" id="adminToggleBtn" onclick="toggleAdminMode()">🔐 운영자 로그인</button>
  </div>

  <!-- 공지 작성 (운영자만) -->
  <div class="card" id="writeCard" style="display:none">
    <div class="section-title">✏️ 공지 작성</div>
    <div class="write-form visible">
      <div class="write-row">
        <select class="type-select" id="noticeType">
          <option value="notice">📢 공지</option>
          <option value="event">🎉 이벤트</option>
          <option value="ad">📣 광고</option>
        </select>
        <label class="pin-toggle"><input type="checkbox" id="noticePin"> 📌 상단 고정</label>
      </div>
      <input class="write-input" id="noticeTitle" placeholder="제목을 입력하세요" maxlength="50">
      <textarea class="write-input write-textarea" id="noticeBody" placeholder="내용을 입력하세요&#10;이벤트 일정, 광고, 공지 등 자유롭게 작성해요"></textarea>
      <div class="write-row" style="justify-content:flex-end">
        <button class="write-btn" onclick="submitNotice()">📢 등록</button>
      </div>
    </div>
  </div>

  <!-- 공지 목록 -->
  <div class="card">
    <div class="section-title">📋 전체 공지 <span id="noticeCount" style="font-family:'Noto Sans KR';font-size:0.7rem;font-weight:700;background:var(--green);color:#000;border-radius:10px;padding:2px 8px;letter-spacing:0"></span></div>
    <div class="notice-list" id="noticeList"><div class="empty-state">공지사항이 없어요</div></div>
  </div>
</div>

<!-- 비밀번호 모달 -->
<div class="pw-modal" id="pwModal">
  <div class="pw-box">
    <div class="pw-title">🔐 운영자 인증</div>
    <div class="pw-sub">운영자 비밀번호를 입력하세요</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="••••••" maxlength="20">
    <div class="pw-actions">
      <button class="pw-cancel" onclick="closePwModal()">취소</button>
      <button class="pw-confirm" onclick="confirmPassword()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCTcxZfr-L-oe25DJyNMj3e8vdEgmbgqog",
    authDomain:"tokyo-smash.firebaseapp.com",
    databaseURL:"https://tokyo-smash-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"tokyo-smash",storageBucket:"tokyo-smash.firebasestorage.app",
    messagingSenderId:"885467955971",
    appId:"1:885467955971:web:e1ad21d28e0a910a02df36",
    measurementId:"G-D6V57RK9VK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const noticesRef = ref(db,'notices');
  const ADMIN_PW = 'tokyosmash2024'; // ← 여기서 비밀번호 변경

  onValue(ref(db,'.info/connected'), snap=>{
    const on=snap.val();
    document.getElementById('connDot').className='conn-dot'+(on?' online':'');
    document.getElementById('connText').textContent=on?'실시간 연결됨 ✓':'오프라인';
  });

  // ── 운영자 모드 ──
  let isAdmin = sessionStorage.getItem('ts_admin')==='1';
  let editingId = null;

  function applyAdminUI(){
    const dot=document.getElementById('adminDot');
    const txt=document.getElementById('adminStatusText');
    const btn=document.getElementById('adminToggleBtn');
    const wc=document.getElementById('writeCard');
    if(isAdmin){
      dot.className='admin-dot on';
      txt.textContent='운영자 모드 활성';
      btn.textContent='🔓 로그아웃';
      wc.style.display='';
    } else {
      dot.className='admin-dot';
      txt.textContent='일반 모드';
      btn.textContent='🔐 운영자 로그인';
      wc.style.display='none';
    }
    renderNotices(lastNotices);
  }

  window.toggleAdminMode=function(){
    if(isAdmin){
      isAdmin=false;
      sessionStorage.removeItem('ts_admin');
      applyAdminUI();
      toast('로그아웃됨');
    } else {
      openPwModal();
    }
  };

  window.openPwModal=function(){
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').className='pw-input';
    document.getElementById('pwModal').classList.add('open');
    setTimeout(()=>document.getElementById('pwInput').focus(),100);
  };

  window.closePwModal=function(){
    document.getElementById('pwModal').classList.remove('open');
  };

  window.confirmPassword=function(){
    const val=document.getElementById('pwInput').value;
    if(val===ADMIN_PW){
      isAdmin=true;
      sessionStorage.setItem('ts_admin','1');
      closePwModal();
      applyAdminUI();
      toast('운영자 모드 활성화 ✓');
    } else {
      const inp=document.getElementById('pwInput');
      inp.className='pw-input error';
      inp.value='';
      setTimeout(()=>inp.className='pw-input',600);
      toast('비밀번호가 틀렸어요');
    }
  };

  document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.confirmPassword();});
  document.getElementById('pwModal').addEventListener('click',e=>{if(e.target.id==='pwModal')closePwModal();});

  // ── 공지 ──
  let lastNotices={};

  onValue(noticesRef, snap=>{
    lastNotices=snap.val()||{};
    renderNotices(lastNotices);
  });

  function renderNotices(notices){
    const list=document.getElementById('noticeList');
    const entries=Object.entries(notices);
    document.getElementById('noticeCount').textContent=entries.length?entries.length+'개':'';

    if(!entries.length){list.innerHTML='<div class="empty-state">아직 공지사항이 없어요</div>';return;}

    // 고정 먼저, 그 다음 최신순
    entries.sort((a,b)=>{
      if(a[1].pinned&&!b[1].pinned) return -1;
      if(!a[1].pinned&&b[1].pinned) return 1;
      return b[1].createdAt-a[1].createdAt;
    });

    list.innerHTML=entries.map(([id,n])=>{
      const typeLabel={notice:'📢 공지',event:'🎉 이벤트',ad:'📣 광고'}[n.type]||'📢 공지';
      const badgeClass={notice:'badge-notice',event:'badge-event',ad:'badge-ad'}[n.type]||'badge-notice';
      const date=new Date(n.createdAt).toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});
      const isEditing=editingId===id;

      if(isEditing&&isAdmin){
        return `<div class="notice-card editing">
          <div class="write-row" style="margin-bottom:8px">
            <select class="type-select" id="edit_type_${id}">
              <option value="notice" ${n.type==='notice'?'selected':''}>📢 공지</option>
              <option value="event" ${n.type==='event'?'selected':''}>🎉 이벤트</option>
              <option value="ad" ${n.type==='ad'?'selected':''}>📣 광고</option>
            </select>
            <label class="pin-toggle"><input type="checkbox" id="edit_pin_${id}" ${n.pinned?'checked':''}> 📌 상단 고정</label>
          </div>
          <input class="write-input" id="edit_title_${id}" value="${esc(n.title)}" style="margin-bottom:8px">
          <textarea class="write-input write-textarea" id="edit_body_${id}">${esc(n.body)}</textarea>
          <div class="write-row" style="justify-content:flex-end;margin-top:8px;gap:8px">
            <button class="admin-btn-sm" onclick="cancelEdit()">취소</button>
            <button class="write-btn" onclick="saveEdit('${id}')">저장</button>
          </div>
        </div>`;
      }

      return `<div class="notice-card ${n.pinned?'pinned':''} type-${n.type}">
        <div class="notice-header">
          <div class="notice-badges">
            <span class="badge ${badgeClass}">${typeLabel}</span>
            ${n.pinned?'<span class="badge badge-pin">📌 고정</span>':''}
          </div>
          <div class="notice-title">${esc(n.title)}</div>
        </div>
        <div class="notice-body">${esc(n.body)}</div>
        <div class="notice-footer">
          <span class="notice-date">${date}</span>
          ${isAdmin?`<div class="notice-actions">
            <button class="notice-edit-btn" onclick="startEdit('${id}')">수정</button>
            <button class="notice-del-btn" onclick="deleteNotice('${id}')">삭제</button>
          </div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  window.submitNotice=async function(){
    const title=document.getElementById('noticeTitle').value.trim();
    const body=document.getElementById('noticeBody').value.trim();
    const type=document.getElementById('noticeType').value;
    const pinned=document.getElementById('noticePin').checked;
    if(!title){toast('제목을 입력해주세요');return;}
    if(!body){toast('내용을 입력해주세요');return;}
    const newRef=push(noticesRef);
    await set(newRef,{title,body,type,pinned,createdAt:Date.now()});
    document.getElementById('noticeTitle').value='';
    document.getElementById('noticeBody').value='';
    document.getElementById('noticePin').checked=false;
    toast('공지 등록됨 ✓');
  };

  window.deleteNotice=async function(id){
    if(!confirm('공지를 삭제할까요?')) return;
    await remove(ref(db,`notices/${id}`));
    toast('공지 삭제됨');
  };

  window.startEdit=function(id){editingId=id;renderNotices(lastNotices);};
  window.cancelEdit=function(){editingId=null;renderNotices(lastNotices);};

  window.saveEdit=async function(id){
    const title=document.getElementById(`edit_title_${id}`)?.value.trim();
    const body=document.getElementById(`edit_body_${id}`)?.value.trim();
    const type=document.getElementById(`edit_type_${id}`)?.value;
    const pinned=document.getElementById(`edit_pin_${id}`)?.checked;
    if(!title||!body){toast('제목과 내용을 입력해주세요');return;}
    await update(ref(db,`notices/${id}`),{title,body,type,pinned});
    editingId=null;
    toast('공지 수정됨 ✓');
  };

  applyAdminUI();

  function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let tt;
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
</html>
