<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tokyo Smash">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tokyo Smash 🏸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  :root{--green:#00c853;--green-dark:#009624;--green-light:#b9f6ca;--court:#1a472a;--white:#f5fff7;--gray:#b0bec5;--accent:#ffe600;--orange:#ff9800;--red:#ef5350;--purple:#ce93d8;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--court);color:var(--white);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 61px);pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 100px}
  .nav{display:flex;gap:6px;justify-content:center;padding:16px 0 0;flex-wrap:wrap}
  .nav-btn{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
  .nav-btn.active{background:var(--green);border-color:var(--green);color:#000}
  .nav-btn:hover:not(.active){border-color:var(--green);color:var(--green)}
  header{text-align:center;padding:24px 0 20px}
  .logo-shuttle{font-size:2.8rem;display:block;animation:spin-float 3s ease-in-out infinite}
  @keyframes spin-float{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(8deg)}}
  .logo-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,10vw,4.2rem);letter-spacing:4px;line-height:1;color:var(--white);text-shadow:0 0 30px rgba(0,200,83,0.6),3px 3px 0 var(--green-dark)}
  .logo-title span{color:var(--accent)}
  .logo-sub{font-size:0.75rem;letter-spacing:3px;color:var(--green-light);margin-top:4px;text-transform:uppercase;opacity:0.8}
  .date-badge{display:inline-block;margin-top:12px;background:rgba(0,200,83,0.15);border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:4px 16px;font-size:0.8rem;color:var(--green-light);letter-spacing:1px}
  .conn-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:0.75rem;color:var(--white);background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);transition:background 0.3s}
  .conn-dot.online{background:#00ff88;box-shadow:0 0 6px #00ff88}
  .admin-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:14px}
  .admin-status{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--gray)}
  .admin-dot{width:7px;height:7px;border-radius:50%;background:var(--gray);flex-shrink:0}
  .admin-dot.on{background:var(--accent);box-shadow:0 0 5px var(--accent)}
  .admin-btn-sm{font-family:'Bebas Neue',sans-serif;font-size:0.78rem;letter-spacing:1px;padding:4px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s}
  .admin-btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  /* 최신 공지 배너 */
  .notice-banner{display:none;background:rgba(255,230,0,0.08);border:1px solid rgba(255,230,0,0.25);border-radius:12px;padding:10px 14px;margin-bottom:14px;cursor:pointer;transition:all 0.2s;text-decoration:none}
  .notice-banner:hover{background:rgba(255,230,0,0.13)}
  .notice-banner-inner{display:flex;align-items:center;gap:10px}
  .notice-banner-text{flex:1;min-width:0}
  .notice-banner-label{font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--accent);margin-bottom:2px}
  .notice-banner-title{font-size:0.85rem;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .notice-banner-arrow{font-size:0.8rem;color:rgba(255,230,0,0.4);flex-shrink:0}
  .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:20px}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .count-badge{font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;font-weight:700;background:var(--green);color:#000;border-radius:10px;padding:2px 8px;letter-spacing:0;line-height:1.4}
  /* 출석 카드 */
  .attend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
  .attend-chip{background:rgba(0,200,83,0.15);border:1px solid var(--green);border-radius:10px;padding:10px 12px;text-align:center}
  .attend-chip.rested{background:rgba(255,152,0,0.15);border-color:var(--orange)}
  .attend-chip-name{font-size:0.88rem;font-weight:700;color:var(--green-light)}
  .attend-chip.rested .attend-chip-name{color:#ffcc80}
  .attend-chip-rank{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:1px;margin-top:2px;font-weight:700}
  .attend-chip-rest{font-size:0.65rem;color:var(--orange);margin-top:2px}
  .empty-state{text-align:center;padding:24px;color:rgba(255,255,255,0.3);font-size:0.88rem}
  .empty-link{color:var(--green);text-decoration:none;font-weight:700}
  /* 매칭 */
  .btn-row{display:flex;gap:8px;margin-bottom:10px}
  .btn-match{flex:1;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#000;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,83,0.35);transition:all 0.2s}
  .btn-match:hover{box-shadow:0 6px 28px rgba(0,200,83,0.5)}
  .btn-match:disabled{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);box-shadow:none;cursor:not-allowed}
  .match-hint{margin-top:4px;font-size:0.78rem;color:var(--gray);text-align:center}
  /* 대진표 */
  .results-wrap{display:none}.results-wrap.visible{display:block}
  .games-list{display:flex;flex-direction:column;gap:14px}
  .game-card{background:rgba(0,200,83,0.06);border:1px solid rgba(0,200,83,0.2);border-radius:14px;padding:14px 16px;animation:slide-in 0.4s ease both}
  @keyframes slide-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .court-label{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:3px;color:rgba(0,200,83,0.6);margin-bottom:8px}
  .game-teams{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .team-box{flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px;text-align:center}
  .team-label{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:2px;color:var(--green);margin-bottom:6px}
  .vs-badge{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent);text-shadow:0 0 10px rgba(255,230,0,0.5);flex-shrink:0}
  .balance-bar-wrap{margin-bottom:12px}
  .balance-label{font-size:0.7rem;color:var(--gray);margin-bottom:4px;display:flex;justify-content:space-between}
  .balance-bar-bg{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
  .balance-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width 0.4s}
  .score-section{border-top:1px solid rgba(255,255,255,0.07);padding-top:12px}
  .score-row{display:flex;align-items:center;gap:8px}
  .score-label{font-size:0.75rem;color:var(--gray);white-space:nowrap;flex-shrink:0;min-width:36px}
  .score-inputs{display:flex;align-items:center;gap:6px;flex:1}
  .score-input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1.2rem;padding:6px 8px;outline:none;text-align:center;transition:border-color 0.2s;min-width:0}
  .score-input:focus{border-color:var(--green)}
  .score-input::-webkit-inner-spin-button{opacity:0.4}
  .score-dash{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gray);flex-shrink:0}
  .score-submit-btn{background:var(--green);color:#000;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:1px;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
  .score-submit-btn:hover{background:var(--green-dark)}
  .result-done{font-size:0.8rem;color:var(--green);padding:4px 0}
  .player-slot{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 10px;margin:3px;cursor:pointer;transition:all 0.15s;font-size:0.84rem;font-weight:600;color:var(--white);user-select:none}
  .player-slot:hover{border-color:var(--accent);color:var(--accent)}
  .player-slot.selected{background:rgba(255,230,0,0.15);border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(255,230,0,0.2)}
  .player-slot.locked{cursor:default;opacity:0.6}
  .player-rating{font-family:'Bebas Neue',sans-serif;font-size:0.72rem;opacity:0.8}
  .team-players-wrap{display:flex;flex-wrap:wrap;justify-content:center;min-height:36px}
  .team-rating-sum{font-size:0.7rem;color:var(--gray);margin-top:4px}
  .swap-hint{font-size:0.72rem;color:var(--accent);text-align:center;margin-bottom:8px;opacity:0.8;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
  .rest-card{background:rgba(255,152,0,0.06);border:1px dashed rgba(255,152,0,0.35);border-radius:14px;padding:14px 18px;animation:slide-in 0.4s ease both}
  .rest-title{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:2px;color:var(--orange);margin-bottom:8px}
  .rest-names{display:flex;flex-wrap:wrap;gap:6px}
  .rest-chip{background:rgba(255,152,0,0.15);border:1px solid rgba(255,152,0,0.3);border-radius:8px;padding:4px 10px;font-size:0.82rem;font-weight:600;color:var(--orange)}
  .action-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .btn-outline{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--white);border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;min-width:80px}
  .btn-outline:hover{border-color:var(--green);color:var(--green)}
  /* 히스토리 */
  .history-wrap{display:none}.history-wrap.visible{display:block}
  .history-toggle{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;border-radius:10px;padding:10px;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
  .history-toggle:hover{border-color:var(--green);color:var(--green)}
  .history-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
  .history-game{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:0.8rem}
  .history-court{font-family:'Bebas Neue',sans-serif;font-size:0.8rem;color:rgba(0,200,83,0.5);min-width:24px}
  .history-teams{flex:1;color:var(--white)}
  .history-winner{font-size:0.68rem;color:var(--green);margin-top:1px}
  .history-score{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--accent);flex-shrink:0}
  .history-empty{text-align:center;padding:16px;color:rgba(255,255,255,0.25);font-size:0.85rem}
  /* 수동 매치 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
  .modal-overlay.open{display:flex}
  .modal{background:#1e5c34;border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:24px;width:100%;max-width:600px;margin:auto}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--green);margin-bottom:20px}
  .modal-courts{display:flex;flex-direction:column;gap:16px;margin-bottom:20px}
  .manual-court{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px}
  .manual-court-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .manual-court-label{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;color:rgba(0,200,83,0.7)}
  .manual-court-del{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:1rem;transition:color 0.2s}
  .manual-court-del:hover{color:var(--red)}
  .manual-teams{display:flex;gap:8px;align-items:flex-start}
  .manual-team{flex:1}
  .manual-team-label{font-family:'Bebas Neue',sans-serif;font-size:0.72rem;letter-spacing:2px;color:var(--green);margin-bottom:6px}
  .manual-slots{display:flex;flex-direction:column;gap:6px}
  .manual-slot{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.15);border-radius:8px;padding:7px 10px;cursor:pointer;transition:all 0.15s;position:relative}
  .manual-slot:hover{border-color:var(--green);background:rgba(0,200,83,0.08)}
  .manual-slot.filled{border-style:solid;border-color:rgba(0,200,83,0.3);background:rgba(0,200,83,0.08)}
  .manual-slot-name{flex:1;font-size:0.84rem;font-weight:600;color:var(--white)}
  .manual-slot-rating{font-family:'Bebas Neue',sans-serif;font-size:0.72rem;color:var(--gray)}
  .manual-slot-clear{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:0.8rem;padding:0;line-height:1;transition:color 0.2s}
  .manual-slot-clear:hover{color:var(--red)}
  .manual-slot-empty{font-size:0.8rem;color:rgba(255,255,255,0.25);flex:1}
  .manual-vs{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:rgba(255,230,0,0.4);align-self:center;flex-shrink:0}
  .add-court-btn{width:100%;padding:10px;background:transparent;border:1px dashed rgba(0,200,83,0.3);border-radius:10px;color:rgba(0,200,83,0.5);font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
  .add-court-btn:hover{border-color:var(--green);color:var(--green)}
  .modal-actions{display:flex;gap:8px}
  .modal-btn-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--white);border-radius:10px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer}
  .modal-btn-cancel:hover{border-color:var(--red);color:var(--red)}
  .modal-btn-confirm{flex:2;background:var(--green);color:#000;border:none;border-radius:10px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer}
  .modal-btn-confirm:hover{background:var(--green-dark)}
  .search-dropdown{position:absolute;top:100%;left:0;right:0;background:#1e5c34;border:1px solid rgba(0,200,83,0.3);border-radius:10px;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);margin-top:4px}
  .search-item{padding:8px 12px;font-size:0.84rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s}
  .search-item:hover{background:rgba(0,200,83,0.15)}
  .search-item.disabled{opacity:0.35;cursor:not-allowed}
  .search-item-rating{font-family:'Bebas Neue',sans-serif;font-size:0.75rem;color:var(--gray)}
  .search-input{width:100%;background:transparent;border:none;color:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:0.84rem;outline:none;flex:1}
  .search-input::placeholder{color:rgba(255,255,255,0.25)}
  /* 비밀번호 모달 */
  .pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
  .pw-modal.open{display:flex}
  .pw-box{background:#1e5c34;border:1px solid rgba(0,200,83,0.3);border-radius:20px;padding:28px 24px;width:90%;max-width:340px;text-align:center}
  .pw-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--green);margin-bottom:6px}
  .pw-sub{font-size:0.8rem;color:var(--gray);margin-bottom:18px}
  .pw-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:var(--white);font-size:1.1rem;padding:12px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;transition:border-color 0.2s}
  .pw-input:focus{border-color:var(--green)}
  .pw-input.error{border-color:var(--red);animation:shake 0.3s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .pw-actions{display:flex;gap:8px}
  .pw-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--white);border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm{flex:2;background:var(--green);color:#000;border:none;border-radius:10px;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;cursor:pointer}
  .pw-confirm:hover{background:var(--green-dark)}

  /* ── 팝업 광고 ── */
  .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;transition:opacity 0.3s}
  .popup-overlay.hidden{opacity:0;pointer-events:none}
  .popup-box{position:relative;width:92vw;max-width:480px;background:#111;border-radius:16px;overflow:hidden;border:1px solid rgba(26,255,74,0.2);transition:width 0.4s ease}
  .popup-close-x{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.65);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;z-index:10;display:flex;align-items:center;justify-content:center}
  .popup-slider-wrap{position:relative;overflow:hidden}
  .popup-slides{display:flex;transition:transform 0.55s cubic-bezier(0.77,0,0.175,1)}
  .popup-slide{flex-shrink:0;background:#000;line-height:0}
  .popup-slide img{width:100%;height:auto;max-height:65vh;object-fit:contain;display:block;margin:0 auto}
  .popup-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.45);border:1px solid rgba(26,255,74,0.3);color:#1aff4a;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10}
  .popup-nav:hover{background:rgba(26,255,74,0.15)}
  .popup-prev{left:8px}.popup-next{right:8px}
  .popup-dots{display:flex;justify-content:center;gap:6px;padding:7px 0 5px;background:rgba(0,0,0,0.35)}
  .popup-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.3s}
  .popup-dot.active{background:#1aff4a;width:20px;border-radius:4px}
  .popup-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0a0a0a;border-top:1px solid rgba(255,255,255,0.07)}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyCTcxZfr-L-oe25DJyNMj3e8vdEgmbgqog",
    authDomain:"tokyo-smash.firebaseapp.com",
    databaseURL:"https://tokyo-smash-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"tokyo-smash",storageBucket:"tokyo-smash.firebasestorage.app",
    messagingSenderId:"885467955971",
    appId:"1:885467955971:web:e1ad21d28e0a910a02df36",
    measurementId:"G-D6V57RK9VK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const MAX_COURTS = 3, HISTORY_DAYS = 84;
  const todayKey = new Date().toISOString().slice(0,10);

  document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  onValue(ref(db,'.info/connected'), snap=>{
    const on=snap.val();
    document.getElementById('connDot').className='conn-dot'+(on?' online':'');
    document.getElementById('connText').textContent=on?'실시간 연결됨 ✓':'오프라인';
  });

  let members={}, present={}, lastRest=[], currentGames=null, swapSelected=null;
  let todayRestCount={}, todayRoundHistory=[];
  let isAdmin = sessionStorage.getItem('ts_admin')==='1';

  // ── 운영자 ──
  function applyAdminUI(){
    const dot=document.getElementById('adminDot');
    const txt=document.getElementById('adminStatusText');
    const btn=document.getElementById('adminToggleBtn');
    const matchCard=document.getElementById('matchCard');
    const matchActions=document.getElementById('matchActions');
    if(isAdmin){
      dot.className='admin-dot on'; txt.textContent='운영자 모드 ✓'; btn.textContent='🔓 로그아웃';
      matchCard.style.display=''; matchActions.style.display='';
    } else {
      dot.className='admin-dot'; txt.textContent='일반 모드'; btn.textContent='🔐 운영자 로그인';
      matchCard.style.display='none'; matchActions.style.display='none';
    }
    if(currentGames) renderResults(currentGames.games, currentGames.rest, currentGames.results||{});
  }

  window.toggleAdminMode=function(){
    if(isAdmin){isAdmin=false;sessionStorage.removeItem('ts_admin');applyAdminUI();toast('로그아웃됨');}
    else openPwModal();
  };
  window.openPwModal=function(){document.getElementById('pwInput').value='';document.getElementById('pwInput').className='pw-input';document.getElementById('pwModal').classList.add('open');setTimeout(()=>document.getElementById('pwInput').focus(),100);};
  window.closePwModal=function(){document.getElementById('pwModal').classList.remove('open');};
  window.confirmPassword=async function(){
    const val=document.getElementById('pwInput').value;
    try{
      const snap=await new Promise(res=>onValue(ref(db,'config/adminPw'),res,{onlyOnce:true}));
      if(val===snap.val()){isAdmin=true;sessionStorage.setItem('ts_admin','1');closePwModal();applyAdminUI();toast('운영자 모드 활성화 ✓');}
      else{const inp=document.getElementById('pwInput');inp.className='pw-input error';inp.value='';setTimeout(()=>inp.className='pw-input',600);toast('비밀번호가 틀렸어요');}
    }catch(e){toast('연결 오류');}
  };
  document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.confirmPassword();});
  document.getElementById('pwModal').addEventListener('click',e=>{if(e.target.id==='pwModal')closePwModal();});

  // ── 데이터 구독 ──
  onValue(ref(db,'members'), snap=>{members=snap.val()||{};render();});
  onValue(ref(db,`present/${todayKey}`), snap=>{present=snap.val()||{};render();});
  onValue(ref(db,`matches/${todayKey}`), snap=>{
    const d=snap.val();
    if(d&&d.games){
      lastRest=d.rest||[]; currentGames=d; renderResults(d.games,d.rest,d.results||{});
      const ml=document.getElementById('matchModeLabel');
      if(ml) ml.textContent=d.mode==='diverse'?'🎲 다양성 모드':'⚖️ 밸런스 모드';
    } else {
      currentGames=null; document.getElementById('resultsSection').classList.remove('visible');
    }
  });
  onValue(ref(db,'history'), snap=>{renderHistory(snap.val()||{});});
  onValue(ref(db,'notices'), snap=>{renderNoticeBanner(snap.val()||{});});
  onValue(ref(db,`roundHistory/${todayKey}`), snap=>{
    const d=snap.val()||{};
    todayRestCount={}; todayRoundHistory=[];
    Object.values(d).sort((a,b)=>a.round-b.round).forEach(round=>{
      (round.rest||[]).forEach(id=>{todayRestCount[id]=(todayRestCount[id]||0)+1;});
      todayRoundHistory.push(round.teams||[]);
    });
  });

  purgeOldHistory();
  applyAdminUI();

  // ── 공지 배너 ──
  function renderNoticeBanner(notices){
    const entries=Object.values(notices).sort((a,b)=>{
      if(a.pinned&&!b.pinned)return -1; if(!a.pinned&&b.pinned)return 1;
      return b.createdAt-a.createdAt;
    });
    const banner=document.getElementById('noticeBanner');
    if(!entries.length){banner.style.display='none';return;}
    document.getElementById('noticeBannerTitle').textContent=entries[0].title;
    banner.style.display='';
  }

  // ── 랭크 ──
  function getRank(r){
    if(r>=85)return{rank:'S',color:'#ff6b6b'};
    if(r>=65)return{rank:'A',color:'#ffd93d'};
    if(r>=45)return{rank:'B',color:'#6bcb77'};
    if(r>=25)return{rank:'C',color:'#4d96ff'};
    return{rank:'D',color:'#b0bec5'};
  }

  // ── 출석 렌더 ──
  function render(){
    const grid=document.getElementById('attendGrid');
    const presentIds=Object.keys(present).filter(id=>members[id]);
    if(!presentIds.length){
      grid.innerHTML=`<div class="empty-state">아직 출석한 멤버가 없어요<br><a class="empty-link" href="members.html">👥 멤버 관리에서 출석 체크</a></div>`;
    } else {
      grid.innerHTML=presentIds.map(id=>{
        const m=members[id], r=m.rating??50;
        const {rank,color}=getRank(r);
        const wasRested=lastRest.includes(m.name);
        const restCnt=todayRestCount[id]||0;
        return `<div class="attend-chip ${wasRested?'rested':''}">
          <div class="attend-chip-name">${esc(m.name)}</div>
          <div class="attend-chip-rank" style="color:${color}">${rank}</div>
          ${wasRested?'<div class="attend-chip-rest">☕ 전 라운드 휴식</div>':''}
          ${restCnt>0&&!wasRested?`<div class="attend-chip-rest" style="color:rgba(255,152,0,0.6)">누적 휴식 ${restCnt}회</div>`:''}
        </div>`;
      }).join('');
    }
    const cnt=presentIds.length, courts=Math.min(Math.floor(cnt/4),MAX_COURTS);
    document.getElementById('presentCount').textContent=cnt+'명';
    const btn=document.getElementById('matchBtn'), hint=document.getElementById('matchHint');
    if(btn){
      if(cnt<4){btn.disabled=true;hint.textContent=`출석 멤버가 4명 이상이어야 매칭됩니다 (현재 ${cnt}명)`;}
      else{btn.disabled=false;hint.textContent=`출석 ${cnt}명 · ${courts}코트 · ${cnt-courts*4>0?`휴식 ${cnt-courts*4}명`:'전원 참가'}`;}
    }
  }

  // ── 매칭 알고리즘 ──
  function balancedCourtAssign(ids, courts){
    const sorted=[...ids].sort((a,b)=>(members[b]?.rating??50)-(members[a]?.rating??50));
    const numTeams=courts*2;
    const teams=Array.from({length:numTeams},()=>[]);
    sorted.forEach((id,i)=>{
      const round=Math.floor(i/numTeams), pos=i%numTeams;
      teams[round%2===0?pos:numTeams-1-pos].push(id);
    });
    const teamSums=teams.map((team,i)=>({i,sum:team.reduce((s,id)=>s+(members[id]?.rating??50),0),team}));
    teamSums.sort((a,b)=>b.sum-a.sum);
    const courtGroups=Array.from({length:courts},()=>[]);
    for(let c=0;c<courts;c++){
      courtGroups[c]=[...teamSums[c*2].team,...teamSums[c*2+1].team];
    }
    return courtGroups;
  }

  const MAX_RATING_DIFF=15;

  function bestSplitAvoidRepeat(ids){
    const pairs=[[0,1],[0,2],[0,3]]; let best=null;
    for(const [i,j] of pairs){
      const a=[ids[i],ids[j]], b=ids.filter((_,k)=>k!==i&&k!==j);
      const rA=a.reduce((s,id)=>s+(members[id]?.rating??50),0);
      const rB=b.reduce((s,id)=>s+(members[id]?.rating??50),0);
      const diff=Math.abs(rA-rB);
      if(diff>MAX_RATING_DIFF) continue;
      let pen=0;
      for(const rt of todayRoundHistory) for(const t of rt){
        const tA=t.teamA||[], tB=t.teamB||[];
        if(a.every(id=>tA.includes(id))||b.every(id=>tB.includes(id))||a.every(id=>tB.includes(id))||b.every(id=>tA.includes(id))) pen+=20;
      }
      if(!best||diff+pen<best.score) best={a,b,diff,score:diff+pen};
    }
    if(!best){
      for(const [i,j] of pairs){
        const a=[ids[i],ids[j]], b=ids.filter((_,k)=>k!==i&&k!==j);
        const diff=Math.abs(a.reduce((s,id)=>s+(members[id]?.rating??50),0)-b.reduce((s,id)=>s+(members[id]?.rating??50),0));
        if(!best||diff<best.diff) best={a,b,diff,score:diff};
      }
    }
    return best;
  }

  function diverseSplit(ids){
    const sorted=[...ids].sort((a,b)=>(members[b]?.rating??50)-(members[a]?.rating??50));
    const pairs=[[0,1],[0,2],[0,3]];
    const candidates=[];
    for(const [i,j] of pairs){
      const a=[sorted[i],sorted[j]], b=sorted.filter((_,k)=>k!==i&&k!==j);
      const rA=a.reduce((s,id)=>s+(members[id]?.rating??50),0);
      const rB=b.reduce((s,id)=>s+(members[id]?.rating??50),0);
      const diff=Math.abs(rA-rB);
      if(diff<=MAX_RATING_DIFF) candidates.push({a,b,diff});
    }
    if(!candidates.length) return bestSplitAvoidRepeat(ids);
    candidates.forEach(cand=>{
      let pen=0;
      for(const rt of todayRoundHistory) for(const t of rt){
        const tA=t.teamA||[], tB=t.teamB||[];
        if(cand.a.every(id=>tA.includes(id))||cand.b.every(id=>tB.includes(id))||cand.a.every(id=>tB.includes(id))||cand.b.every(id=>tA.includes(id))) pen+=20;
      }
      cand.score=cand.diff+pen;
    });
    const minScore=Math.min(...candidates.map(c=>c.score));
    const good=candidates.filter(c=>c.score<=minScore+10);
    return good[Math.floor(Math.random()*good.length)];
  }

  window.generateMatches=async function(mode='balanced'){
    if(!isAdmin){toast('운영자만 매칭을 생성할 수 있어요');return;}
    swapSelected=null;
    const presentIds=Object.keys(present).filter(id=>members[id]);
    const courts=Math.min(Math.floor(presentIds.length/4),MAX_COURTS);
    const lastRestIds=presentIds.filter(id=>lastRest.includes(members[id]?.name));
    const otherIds=shuffle(presentIds.filter(id=>!lastRest.includes(members[id]?.name)));
    otherIds.sort((a,b)=>(todayRestCount[b]||0)-(todayRestCount[a]||0));
    const prioritized=[...shuffle(lastRestIds),...otherIds];
    const active=prioritized.slice(0,courts*4);
    const restIds=prioritized.slice(courts*4);
    const courtGroups=balancedCourtAssign(active,courts);
    const splitFn=mode==='diverse'?diverseSplit:bestSplitAvoidRepeat;
    const games=courtGroups.map((group,ci)=>{
      const split=splitFn(group);
      return{court:ci+1,
        teamA:split.a.map(id=>({name:members[id]?.name,rating:members[id]?.rating??50})),
        teamB:split.b.map(id=>({name:members[id]?.name,rating:members[id]?.rating??50})),
        gameId:`c${ci+1}_${Date.now()}`};
    });
    const rest=restIds.map(id=>members[id]?.name).filter(Boolean);
    const roundRecord={round:Date.now(),rest:restIds,teams:games.map(g=>({
      teamA:g.teamA.map(p=>Object.keys(members).find(id=>members[id]?.name===p.name)).filter(Boolean),
      teamB:g.teamB.map(p=>Object.keys(members).find(id=>members[id]?.name===p.name)).filter(Boolean),
    }))};
    await set(ref(db,`matches/${todayKey}`),{games,rest:rest.length?rest:null,results:{},createdAt:Date.now(),mode});
    await set(ref(db,`roundHistory/${todayKey}/${Date.now()}`),roundRecord);
    toast((mode==='diverse'?'🎲 다양성':'⚖️ 밸런스')+' 대진 생성! 🏸');
  };

  // ── 대진표 렌더 ──
  function renderResults(games,rest,results){
    const section=document.getElementById('resultsSection');
    const list=document.getElementById('gamesList');
    const isSwapping=swapSelected!==null;
    let html=games.map((g,gi)=>{
      const rA=g.teamA.reduce((s,p)=>s+p.rating,0), rB=g.teamB.reduce((s,p)=>s+p.rating,0);
      const pctA=Math.round(rA/(rA+rB)*100)||50;
      const done=results[g.gameId];
      const makeSlots=(team,tKey)=>team.map((p,pi)=>{
        const isSel=swapSelected&&swapSelected.gameIdx===gi&&swapSelected.team===tKey&&swapSelected.playerIdx===pi;
        const canSwap=isAdmin&&!done;
        const {rank,color}=getRank(p.rating);
        return `<span class="player-slot ${isSel?'selected':''} ${!canSwap?'locked':''}" onclick="${canSwap?`swapClick(${gi},'${tKey}',${pi})`:''}">
          ${esc(p.name)}<span class="player-rating" style="color:${color}">${rank}</span></span>`;
      }).join('');
      const scoreHtml=done
        ?`<div class="result-done">✓ 팀 ${done.winner} 승 ${done.scoreA} : ${done.scoreB}</div>`
        :`<div class="score-row">
            <span class="score-label">점수</span>
            <div class="score-inputs">
              <input class="score-input" type="number" id="sA_${g.gameId}" min="0" max="99" placeholder="A">
              <span class="score-dash">:</span>
              <input class="score-input" type="number" id="sB_${g.gameId}" min="0" max="99" placeholder="B">
            </div>
            <button class="score-submit-btn" onclick="submitResult('${g.gameId}',${gi})">입력</button>
          </div>`;
      return `<div class="game-card" style="animation-delay:${gi*0.06}s">
        <div class="court-label">🏟 COURT ${g.court}</div>
        ${isSwapping&&!done?'<div class="swap-hint">👆 스왑할 선수를 선택하세요</div>':''}
        <div class="game-teams">
          <div class="team-box"><div class="team-label">팀 A</div><div class="team-players-wrap">${makeSlots(g.teamA,'teamA')}</div><div class="team-rating-sum">합산 ${rA}</div></div>
          <div class="vs-badge">VS</div>
          <div class="team-box"><div class="team-label">팀 B</div><div class="team-players-wrap">${makeSlots(g.teamB,'teamB')}</div><div class="team-rating-sum">합산 ${rB}</div></div>
        </div>
        <div class="balance-bar-wrap">
          <div class="balance-label"><span>팀A ${pctA}%</span><span>팀B ${100-pctA}%</span></div>
          <div class="balance-bar-bg"><div class="balance-bar-fill" style="width:${pctA}%"></div></div>
        </div>
        <div class="score-section">${scoreHtml}</div>
      </div>`;
    }).join('');
    if(rest&&rest.length) html+=`<div class="rest-card"><div class="rest-title">☕ 휴식 (${rest.length}명)</div><div class="rest-names">${rest.map(n=>`<span class="rest-chip">${esc(n)}</span>`).join('')}</div></div>`;
    list.innerHTML=html;
    section.classList.add('visible');
  }

  window.swapClick=async function(gameIdx,team,playerIdx){
    if(!isAdmin||!currentGames?.games)return;
    if(swapSelected===null){swapSelected={gameIdx,team,playerIdx};renderResults(currentGames.games,currentGames.rest,currentGames.results||{});return;}
    if(swapSelected.gameIdx===gameIdx&&swapSelected.team===team&&swapSelected.playerIdx===playerIdx){swapSelected=null;renderResults(currentGames.games,currentGames.rest,currentGames.results||{});return;}
    const games=JSON.parse(JSON.stringify(currentGames.games));
    const p1=games[swapSelected.gameIdx][swapSelected.team][swapSelected.playerIdx];
    const p2=games[gameIdx][team][playerIdx];
    games[swapSelected.gameIdx][swapSelected.team][swapSelected.playerIdx]=p2;
    games[gameIdx][team][playerIdx]=p1;
    swapSelected=null;
    await update(ref(db,`matches/${todayKey}`),{games});
    toast(`${p1.name} ↔ ${p2.name} 스왑!`);
  };

  window.submitResult=async function(gameId,idx){
    const sA=parseInt(document.getElementById(`sA_${gameId}`)?.value)||0;
    const sB=parseInt(document.getElementById(`sB_${gameId}`)?.value)||0;
    if(sA===sB){toast('동점은 입력할 수 없어요!');return;}
    const snap=await new Promise(res=>onValue(ref(db,`matches/${todayKey}`),res,{onlyOnce:true}));
    const data=snap.val(); if(!data?.games)return;
    const g=data.games[idx]; if(!g)return;
    const winner=sA>sB?'A':'B';
    const ups={};
    ups[`matches/${todayKey}/results/${gameId}`]={winner,scoreA:sA,scoreB:sB};
    ups[`history/${todayKey}_${gameId}`]={date:todayKey,court:g.court,teamA:g.teamA.map(p=>p.name),teamB:g.teamB.map(p=>p.name),scoreA:sA,scoreB:sB,winner,createdAt:Date.now()};
    await update(ref(db),ups);
    toast(`팀 ${winner} 승 ${sA}:${sB} 🏆`);
  };

  window.clearResults=async function(){if(!isAdmin)return;swapSelected=null;await remove(ref(db,`matches/${todayKey}`));};

  // ── 수동 매치 ──
  let manualData=[];
  window.openManual=function(){
    if(!isAdmin){toast('운영자만 매치를 생성할 수 있어요');return;}
    manualData=currentGames?.games?.length>0
      ?currentGames.games.map(g=>({teamA:g.teamA.map(p=>({...p})),teamB:g.teamB.map(p=>({...p}))}))
      :[{teamA:[null,null],teamB:[null,null]}];
    renderManualModal();
    document.getElementById('manualModal').classList.add('open');
  };
  window.closeManual=function(){document.getElementById('manualModal').classList.remove('open');closeAllDropdowns();};
  window.handleModalClick=function(e){if(e.target.id==='manualModal')closeManual();};
  window.addManualCourt=function(){if(manualData.length>=MAX_COURTS){toast(`최대 ${MAX_COURTS}코트!`);return;}manualData.push({teamA:[null,null],teamB:[null,null]});renderManualModal();};
  window.removeManualCourt=function(ci){manualData.splice(ci,1);renderManualModal();};

  function renderManualModal(){
    const container=document.getElementById('manualCourts');
    container.innerHTML=manualData.map((court,ci)=>{
      const makeSlots=(team,tKey)=>team.map((p,pi)=>`
        <div class="manual-slot ${p?'filled':''}" id="slot_${ci}_${tKey}_${pi}" onclick="openSlotSearch(${ci},'${tKey}',${pi})">
          ${p?`<span class="manual-slot-name">${esc(p.name)}</span><span class="manual-slot-rating">${p.rating}</span><button class="manual-slot-clear" onclick="event.stopPropagation();clearSlot(${ci},'${tKey}',${pi})">✕</button>`
             :`<span class="manual-slot-empty">+ 선수 선택</span>`}
        </div>`).join('');
      return `<div class="manual-court">
        <div class="manual-court-header"><span class="manual-court-label">🏟 COURT ${ci+1}</span>${manualData.length>1?`<button class="manual-court-del" onclick="removeManualCourt(${ci})">✕</button>`:''}</div>
        <div class="manual-teams">
          <div class="manual-team"><div class="manual-team-label">팀 A</div><div class="manual-slots">${makeSlots(court.teamA,'teamA')}</div></div>
          <span class="manual-vs">VS</span>
          <div class="manual-team"><div class="manual-team-label">팀 B</div><div class="manual-slots">${makeSlots(court.teamB,'teamB')}</div></div>
        </div>
      </div>`;
    }).join('');
  }

  let activeDropdown=null;
  window.openSlotSearch=function(ci,team,pi){
    closeAllDropdowns();
    const slotEl=document.getElementById(`slot_${ci}_${team}_${pi}`); if(!slotEl)return;
    const input=document.createElement('input'); input.className='search-input'; input.placeholder='이름 검색...';
    slotEl.innerHTML=''; slotEl.appendChild(input);
    const dropdown=document.createElement('div'); dropdown.className='search-dropdown'; slotEl.style.position='relative'; slotEl.appendChild(dropdown);
    const usedNames=new Set(); manualData.forEach(c=>[...c.teamA,...c.teamB].forEach(p=>{if(p)usedNames.add(p.name);}));
    function renderDrop(q){
      const filtered=Object.keys(present).filter(id=>members[id]).map(id=>members[id]).filter(m=>m&&m.name.includes(q)).sort((a,b)=>(b.rating??50)-(a.rating??50));
      if(!filtered.length){dropdown.innerHTML='<div class="search-item" style="opacity:0.4">없음</div>';return;}
      dropdown.innerHTML=filtered.map(m=>{const used=usedNames.has(m.name);return `<div class="search-item ${used?'disabled':''}" ${used?'':` onclick="selectSlot(${ci},'${team}',${pi},'${esc(m.name)}',${m.rating??50})"`}><span>${esc(m.name)}</span><span class="search-item-rating">Lv.${m.rating??50}</span></div>`;}).join('');
    }
    renderDrop(''); input.addEventListener('input',()=>renderDrop(input.value)); input.addEventListener('keydown',e=>{if(e.key==='Escape')closeAllDropdowns();});
    setTimeout(()=>input.focus(),50); activeDropdown={ci,team,pi};
  };
  window.selectSlot=function(ci,team,pi,name,rating){manualData[ci][team][pi]={name,rating};closeAllDropdowns();renderManualModal();};
  window.clearSlot=function(ci,team,pi){manualData[ci][team][pi]=null;renderManualModal();};
  function closeAllDropdowns(){activeDropdown=null;renderManualModal();}

  window.confirmManual=async function(){
    for(let ci=0;ci<manualData.length;ci++){if([...manualData[ci].teamA,...manualData[ci].teamB].some(p=>!p)){toast(`코트 ${ci+1}: 빈 슬롯이 있어요!`);return;}}
    const games=manualData.map((c,ci)=>({court:ci+1,teamA:c.teamA.map(p=>({name:p.name,rating:p.rating})),teamB:c.teamB.map(p=>({name:p.name,rating:p.rating})),gameId:`c${ci+1}_${Date.now()}`}));
    await set(ref(db,`matches/${todayKey}`),{games,rest:null,results:{},createdAt:Date.now()});
    closeManual(); swapSelected=null; toast('대진표 저장됨! 🏸');
  };

  // ── 히스토리 ──
  function renderHistory(history){
    const list=document.getElementById('historyList');
    const todayEntries=Object.values(history).filter(h=>h.date===todayKey).sort((a,b)=>b.createdAt-a.createdAt);
    if(!todayEntries.length){list.innerHTML='<div class="history-empty">오늘 기록이 없어요</div>';return;}
    list.innerHTML=todayEntries.map(h=>`<div class="history-game">
      <span class="history-court">C${h.court}</span>
      <div class="history-teams"><div>${h.teamA.map(esc).join(' · ')} <b style="color:${h.winner==='A'?'var(--green)':'var(--gray)'}">vs</b> ${h.teamB.map(esc).join(' · ')}</div><div class="history-winner">팀 ${h.winner} 승</div></div>
      <span class="history-score">${h.scoreA}:${h.scoreB}</span>
    </div>`).join('');
  }
  window.toggleHistory=function(){const w=document.getElementById('historyWrap'),b=document.getElementById('historyToggle'),v=w.classList.toggle('visible');b.textContent=v?'▲ 기록 닫기':'▼ 기록 보기';};

  async function purgeOldHistory(){
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-HISTORY_DAYS);
    const cutoffKey=cutoff.toISOString().slice(0,10);
    const snap=await new Promise(res=>onValue(ref(db,'history'),res,{onlyOnce:true}));
    const h=snap.val()||{}; const ups={};
    for(const [id,v] of Object.entries(h)){if(v.date<cutoffKey)ups[`history/${id}`]=null;}
    if(Object.keys(ups).length) await update(ref(db),ups);
  }


  // ── 팝업 광고 ──
  const HIDE_KEY = 'ts_popup_hide_until';
  let popupCur = 0, popupTotal = 0, popupTimer = null;

  onValue(ref(db,'popupAds'), snap=>{
    const ads = snap.val()||{};
    const entries = Object.values(ads).sort((a,b)=>a.createdAt-b.createdAt);
    popupTotal = entries.length;
    if(!popupTotal) return;

    const hideUntil = localStorage.getItem(HIDE_KEY);
    if(hideUntil && Date.now() < Number(hideUntil)) return;

    const slidesEl = document.getElementById('popupSlides');
    const dotsEl = document.getElementById('popupDots');

    slidesEl.style.width = (popupTotal * 100) + '%';
    slidesEl.innerHTML = entries.map(img=>
      `<div class="popup-slide" style="width:${100/popupTotal}%"><img src="${img.url}" onload="fitPopup(this)"/></div>`
    ).join('');
    dotsEl.innerHTML = entries.map((_,i)=>
      `<div class="popup-dot${i===0?' active':''}" onclick="popupGoTo(${i})"></div>`
    ).join('');

    document.getElementById('adPopup').style.display='flex';

    const firstImg = slidesEl.querySelector('img');
    if(firstImg && firstImg.complete && firstImg.naturalWidth) fitPopup(firstImg);

    if(popupTotal > 1) popupTimer = setInterval(()=>popupMove(1), 3500);
  },{onlyOnce:true});

  window.popupGoTo = function(n){
    popupCur = (n + popupTotal) % popupTotal;
    document.getElementById('popupSlides').style.transform = `translateX(-${popupCur * (100/popupTotal)}%)`;
    document.querySelectorAll('.popup-dot').forEach((d,i)=>d.classList.toggle('active', i===popupCur));
    const img = document.querySelectorAll('.popup-slide img')[popupCur];
    if(img && img.complete && img.naturalWidth) fitPopup(img);
    else if(img) img.onload = ()=>fitPopup(img);
    resetPopupTimer();
  };

  window.popupMove = function(dir){ popupGoTo(popupCur + dir); };

  function resetPopupTimer(){
    if(popupTotal <= 1) return;
    clearInterval(popupTimer);
    popupTimer = setInterval(()=>popupMove(1), 3500);
  }

  window.fitPopup = function(img){
    const vw = window.innerWidth * 0.92;
    const vh = window.innerHeight * 0.75;
    const ratio = img.naturalWidth / img.naturalHeight;
    let w = Math.min(img.naturalWidth, vw);
    let h = w / ratio;
    if(h > vh){ h = vh; w = h * ratio; }
    const box = document.querySelector('.popup-box');
    if(box){ box.style.width = Math.round(w) + 'px'; box.style.maxWidth = '92vw'; }
  };

  window.closePopup = function(){
    const el = document.getElementById('adPopup');
    el.classList.add('hidden');
    setTimeout(()=>el.style.display='none', 300);
    clearInterval(popupTimer);
  };

  window.handleHideToday = function(el){
    if(el.checked) localStorage.setItem(HIDE_KEY, Date.now() + 24*60*60*1000);
    else localStorage.removeItem(HIDE_KEY);
  };

  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let tt; function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
</html>
