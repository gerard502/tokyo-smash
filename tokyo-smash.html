<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Smash 🏸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');

  :root {
    --green: #00c853;
    --green-dark: #009624;
    --green-light: #b9f6ca;
    --court: #1a472a;
    --court-light: #2d6a4f;
    --white: #f5fff7;
    --gray: #b0bec5;
    --gray-light: #eceff1;
    --shadow: rgba(0,0,0,0.18);
    --accent: #ffe600;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--court);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Court line background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.04) 59px, rgba(255,255,255,0.04) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.04) 59px, rgba(255,255,255,0.04) 61px);
    pointer-events: none;
    z-index: 0;
  }

  /* Net line */
  body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 40px 0 24px;
    position: relative;
  }

  .logo-shuttle {
    font-size: 2.8rem;
    display: block;
    animation: spin-float 3s ease-in-out infinite;
  }

  @keyframes spin-float {
    0%, 100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-8px) rotate(8deg); }
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 10vw, 4.2rem);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
    text-shadow: 0 0 30px rgba(0,200,83,0.6), 3px 3px 0 var(--green-dark);
  }

  .logo-title span { color: var(--accent); }

  .logo-sub {
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--green-light);
    margin-top: 4px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .date-badge {
    display: inline-block;
    margin-top: 12px;
    background: rgba(0,200,83,0.15);
    border: 1px solid rgba(0,200,83,0.3);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.8rem;
    color: var(--green-light);
    letter-spacing: 1px;
  }

  /* ── SECTION CARD ── */
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: var(--green);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .count-badge {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    background: var(--green);
    color: #000;
    border-radius: 10px;
    padding: 2px 8px;
    letter-spacing: 0;
    line-height: 1.4;
  }

  /* ── ADD MEMBER ── */
  .add-row {
    display: flex;
    gap: 8px;
  }

  .add-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input:focus { border-color: var(--green); }
  .add-row input::placeholder { color: rgba(255,255,255,0.3); }

  .btn {
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }
  .btn:hover { background: var(--green-dark); }

  .btn-danger {
    background: transparent;
    color: #ef5350;
    border: 1px solid #ef5350;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 8px;
  }

  .btn-danger:hover { background: rgba(239,83,80,0.12); }

  /* ── MEMBER GRID ── */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .member-grid::-webkit-scrollbar { width: 4px; }
  .member-grid::-webkit-scrollbar-track { background: transparent; }
  .member-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .member-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    gap: 6px;
  }

  .member-chip:hover { background: rgba(0,200,83,0.12); border-color: rgba(0,200,83,0.3); }

  .member-chip.present {
    background: rgba(0,200,83,0.2);
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(0,200,83,0.2);
  }

  .member-chip.present .chip-name { color: var(--green-light); }

  .chip-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

  .chip-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .member-chip.present .chip-check {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  .chip-name {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--white);
  }

  .chip-del {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .chip-del:hover { color: #ef5350; }

  /* ── ATTENDANCE BAR ── */
  .attend-info {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .attend-text { font-size: 0.8rem; color: var(--gray); }
  .attend-text strong { color: var(--green); font-size: 1rem; }

  .attend-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .attend-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── MATCH BUTTON ── */
  .match-section { text-align: center; }

  .btn-match {
    width: 100%;
    padding: 16px;
    font-size: 1.3rem;
    letter-spacing: 3px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 4px 20px rgba(0,200,83,0.35);
    transition: box-shadow 0.2s, transform 0.1s;
  }

  .btn-match:hover {
    box-shadow: 0 6px 28px rgba(0,200,83,0.5);
    background: linear-gradient(135deg, #00e676, var(--green));
  }

  .btn-match:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    box-shadow: none;
    cursor: not-allowed;
  }

  .match-hint {
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--gray);
  }

  /* ── RESULTS ── */
  .results-wrap { display: none; }
  .results-wrap.visible { display: block; }

  .games-list { display: flex; flex-direction: column; gap: 12px; }

  .game-card {
    background: rgba(0,200,83,0.06);
    border: 1px solid rgba(0,200,83,0.2);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slide-in 0.4s ease both;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .game-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: rgba(0,200,83,0.4);
    min-width: 32px;
    text-align: center;
    letter-spacing: 1px;
  }

  .game-teams { flex: 1; display: flex; align-items: center; gap: 8px; }

  .team-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }

  .team-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 4px;
  }

  .team-players {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--white);
  }

  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(255,230,0,0.5);
  }

  .standby-card {
    background: rgba(255,230,0,0.06);
    border: 1px dashed rgba(255,230,0,0.3);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slide-in 0.4s ease both;
  }

  .standby-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: var(--accent);
    opacity: 0.8;
  }

  .standby-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── RESET / SHUFFLE ── */
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn-outline {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--white);
    border-radius: 10px;
    padding: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover { border-color: var(--green); color: var(--green); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: rgba(255,255,255,0.25);
    font-size: 0.85rem;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 10px 22px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <span class="logo-shuttle">🏸</span>
    <div class="logo-title">TOKYO <span>SMASH</span></div>
    <div class="logo-sub">배드민턴 동아리 · Badminton Club</div>
    <div class="date-badge" id="dateBadge"></div>
  </header>

  <!-- MEMBER MANAGEMENT -->
  <div class="card">
    <div class="section-title">
      👥 멤버 목록
      <span class="count-badge" id="memberCount">0명</span>
    </div>

    <div class="add-row" style="margin-bottom:14px;">
      <input type="text" id="memberInput" placeholder="새 멤버 이름 입력..." maxlength="12">
      <button class="btn" onclick="addMember()">추가</button>
    </div>

    <div class="member-grid" id="memberGrid">
      <div class="empty-state">멤버를 추가해주세요</div>
    </div>

    <div class="attend-info">
      <span class="attend-text">출석 <strong id="presentCount">0</strong>명</span>
      <div class="attend-bar-wrap">
        <div class="attend-bar" id="attendBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- MATCH BUTTON -->
  <div class="card match-section">
    <div class="section-title">🎯 게임 매칭</div>
    <button class="btn btn-match" id="matchBtn" onclick="generateMatches()" disabled>
      🏸 랜덤 대진 생성
    </button>
    <div class="match-hint" id="matchHint">출석 멤버가 4명 이상이어야 매칭됩니다</div>
  </div>

  <!-- RESULTS -->
  <div class="card results-wrap" id="resultsSection">
    <div class="section-title">🏆 대진표</div>
    <div class="games-list" id="gamesList"></div>
    <div class="action-row">
      <button class="btn-outline" onclick="generateMatches()">🔀 다시 섞기</button>
      <button class="btn-outline" onclick="clearResults()">✖ 닫기</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const DEFAULT_MEMBERS = ['김민준','이서연','박지훈','최수아','정도윤','한예린','윤태양','송채원'];
let members = [];
let present = new Set();

// ── INIT ──
function init() {
  const saved = localStorage.getItem('ts_members');
  members = saved ? JSON.parse(saved) : [...DEFAULT_MEMBERS];

  const savedPresent = localStorage.getItem('ts_present_' + todayKey());
  if (savedPresent) present = new Set(JSON.parse(savedPresent));

  document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('ko-KR', {
    year:'numeric', month:'long', day:'numeric', weekday:'short'
  });

  document.getElementById('memberInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMember();
  });

  render();
}

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function save() {
  localStorage.setItem('ts_members', JSON.stringify(members));
  localStorage.setItem('ts_present_' + todayKey(), JSON.stringify([...present]));
}

// ── RENDER ──
function render() {
  const grid = document.getElementById('memberGrid');

  if (members.length === 0) {
    grid.innerHTML = '<div class="empty-state">멤버를 추가해주세요</div>';
  } else {
    grid.innerHTML = members.map((name, i) => `
      <div class="member-chip ${present.has(name) ? 'present' : ''}" onclick="togglePresent('${escHtml(name)}')">
        <div class="chip-left">
          <div class="chip-check">${present.has(name) ? '✓' : ''}</div>
          <span class="chip-name">${escHtml(name)}</span>
        </div>
        <button class="chip-del" onclick="event.stopPropagation(); deleteMember(${i})" title="삭제">✕</button>
      </div>
    `).join('');
  }

  const total = members.length;
  const cnt = present.size;
  document.getElementById('memberCount').textContent = total + '명';
  document.getElementById('presentCount').textContent = cnt;
  document.getElementById('attendBar').style.width = total > 0 ? (cnt/total*100) + '%' : '0%';

  const matchBtn = document.getElementById('matchBtn');
  const hint = document.getElementById('matchHint');
  if (cnt < 4) {
    matchBtn.disabled = true;
    hint.textContent = `출석 멤버가 4명 이상이어야 매칭됩니다 (현재 ${cnt}명)`;
  } else {
    matchBtn.disabled = false;
    hint.textContent = `출석 ${cnt}명으로 복식 게임 ${Math.floor(cnt/4)}코트 구성 가능`;
  }
}

// ── MEMBERS ──
function addMember() {
  const input = document.getElementById('memberInput');
  const name = input.value.trim();
  if (!name) return;
  if (members.includes(name)) { showToast('이미 있는 멤버예요!'); return; }
  members.push(name);
  save();
  render();
  input.value = '';
  showToast(`${name} 추가됨 ✓`);
}

function deleteMember(i) {
  const name = members[i];
  present.delete(name);
  members.splice(i, 1);
  save();
  render();
  clearResults();
}

function togglePresent(name) {
  if (present.has(name)) present.delete(name);
  else present.add(name);
  save();
  render();
  clearResults();
}

// ── MATCHING ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateMatches() {
  const players = shuffle([...present]);
  const games = [];
  let standby = null;

  // If not divisible by 4, one sits out
  let active = players;
  if (players.length % 4 !== 0) {
    standby = active.pop();
  }

  for (let i = 0; i < active.length; i += 4) {
    games.push({
      teamA: [active[i], active[i+1]],
      teamB: [active[i+2], active[i+3]]
    });
  }

  renderResults(games, standby);
}

function renderResults(games, standby) {
  const section = document.getElementById('resultsSection');
  const list = document.getElementById('gamesList');

  let html = games.map((g, i) => `
    <div class="game-card" style="animation-delay:${i*0.07}s">
      <div class="game-num">${i+1}</div>
      <div class="game-teams">
        <div class="team-box">
          <div class="team-label">팀 A</div>
          <div class="team-players">${g.teamA.map(escHtml).join('<br>')}</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-box">
          <div class="team-label">팀 B</div>
          <div class="team-players">${g.teamB.map(escHtml).join('<br>')}</div>
        </div>
      </div>
    </div>
  `).join('');

  if (standby) {
    html += `
      <div class="standby-card" style="animation-delay:${games.length*0.07}s">
        <span style="font-size:1.2rem">⏳</span>
        <div>
          <div class="standby-label">대기</div>
          <div class="standby-name">${escHtml(standby)}</div>
        </div>
      </div>
    `;
  }

  list.innerHTML = html;
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearResults() {
  document.getElementById('resultsSection').classList.remove('visible');
}

// ── UTILS ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
